/* biểu đồ tăng trưởng (cột chồng theo tháng) */
function GrowthChart({data}){
  const max=Math.max(1,...data.map(d=>d.segs.reduce((s,x)=>s+x.v,0)));
  return (
    <div style={{display:"flex",alignItems:"flex-end",gap:5}}>
      {data.map((d,i)=>{ const tot=d.segs.reduce((s,x)=>s+x.v,0), segs=d.segs.filter(s=>s.v>0);
        return (
          <div key={i} style={{flex:1,textAlign:"center",minWidth:0}}>
            <div className="tiny muted" style={{fontSize:9,marginBottom:2,whiteSpace:"nowrap",overflow:"hidden"}}>{tot>0?fmtK(tot):"·"}</div>
            <div style={{height:104,display:"flex",flexDirection:"column",justifyContent:"flex-end",width:"100%",maxWidth:26,margin:"0 auto"}}>
              {segs.map((s,j)=><div key={j} style={{height:(s.v/max*104)+"px",background:s.c,borderRadius:j===0?"4px 4px 0 0":0}} title={fmtK(s.v)}></div>)}
            </div>
            <div className="tiny muted" style={{fontSize:9,marginTop:4}}>{ymLabel(d.ym).replace(/Th(áng)? /,"T")}</div>
          </div>);
      })}
    </div>
  );
}
function last8YM(){ const a=[]; for(let i=7;i>=0;i--) a.push(addMonths(curYM(),-i)); return a; }
function walletBalUpto(txs,w,endYM){ let bal=0; txs.forEach(t=>{ if(ymOf(t.date)>endYM) return;
  if(t.walletId===w){ if(t.type==="income") bal+=t.amount; else bal-=t.amount; }
  if(t.toWalletId===w && t.type==="transfer") bal+=t.amount; }); return Math.max(0,Math.round(bal)); }

/* ============ TIẾT KIỆM (để dành nhanh · làm tròn · thử thách) ============ */
function Savings({db}){
  const {txs,goals,balanceOf,catById,ym,focus,budgets,walletById,inFocus,addTx}=db;
  const dstr=d=>d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());
  const saved=Math.round(balanceOf("w_save"));
  const linkGoal=goals.find(g=>g.link);
  const saveSrc=(linkGoal&&linkGoal.src)||"w_gd";
  const srcName=(walletById(saveSrc)||{}).name||"ví nguồn";
  const [flash,setFlash]=useState("");
  const [chTab,setChTab]=useState("week");
  const [autos,setAutos]=useState(()=>store.get("vn.autosave",[]));
  const [naAmt,setNaAmt]=useState(500000);
  const [naDay,setNaDay]=useState(1);
  const [naKind,setNaKind]=useState("save");
  const quickSave=(amt)=>{ if(amt<=0) return;
    addTx({type:"transfer",amount:amt,date:today(),walletId:saveSrc,toWalletId:"w_save",note:"Để dành nhanh"});
    setFlash("Đã bỏ "+fmtK(amt)+" vào Tiết kiệm 🐷"); setTimeout(()=>setFlash(""),2200);
  };

  // làm tròn để dành (round-up tháng này)
  const monthExp=txs.filter(t=>t.type==="expense"&&ymOf(t.date)===ym&&inFocus(t,focus));
  const roundPot=monthExp.reduce((s,t)=>s+(Math.ceil(t.amount/10000)*10000-t.amount),0);

  // thử thách tuần này (tự động theo dữ liệu)
  const now=new Date(), dow=(now.getDay()+6)%7, monday=new Date(now);
  monday.setDate(now.getDate()-dow); monday.setHours(0,0,0,0);
  const weekExp=txs.filter(t=>t.type==="expense"&&inFocus(t,focus)&&new Date(t.date)>=monday);
  const EAT=/ăn|cà phê|cafe|coffee|nhậu|trà sữa|nhà hàng|quán|ăn vặt|đồ ăn|bia/i, COFFEE=/cà phê|cafe|coffee|trà sữa/i;
  const SHOP=/mua sắm|shopping|quần áo|thời trang|giày|mỹ phẩm|son|túi|shopee|lazada|tiki|^sắm/i;
  const GROCERY=/chợ|siêu thị|bách hoá|bách hóa|grocery|mart/i;
  const FIXED=/điện|nước|thuê|trọ|nhà ở|internet|wifi|học phí|học|giáo dục|trường|thuốc|khám|bệnh|y tế|sức khỏe|bảo hiểm|sữa|bỉm|tã|vay|trả nợ|hoá đơn|hóa đơn/i;
  const nameOf=t=>(catById(t.categoryId)||{}).name||"";
  const eatSum=weekExp.filter(t=>EAT.test(nameOf(t))).reduce((s,t)=>s+t.amount,0);
  const coffeeCnt=weekExp.filter(t=>COFFEE.test(nameOf(t))).length;
  const shopSum=weekExp.filter(t=>SHOP.test(nameOf(t))).reduce((s,t)=>s+t.amount,0);
  const groceryCnt=weekExp.filter(t=>GROCERY.test(nameOf(t))).length;
  const impulse=weekExp.filter(t=>t.amount>500000 && !FIXED.test(nameOf(t)));
  const savedWeek=txs.filter(t=>t.type==="transfer"&&t.toWalletId==="w_save"&&new Date(t.date)>=monday).reduce((s,t)=>s+t.amount,0);
  let noSpend=0; for(let i=0;i<=dow;i++){ const d=new Date(monday); d.setDate(monday.getDate()+i);
    if(!weekExp.some(t=>t.date===dstr(d))) noSpend++; }
  const budgetTotal=budgets.reduce((s,b)=>s+b.amount,0);
  const budgetSpentTot=budgets.reduce((s,b)=>s+db.budgetSpent(b,ym),0);
  const TAXI=/grab|taxi|xe ôm|gojek|xe công nghệ|cuốc xe/i, DRINK=/nhậu|bia|rượu|beer/i;
  const taxiSum=weekExp.filter(t=>TAXI.test(nameOf(t))).reduce((s,t)=>s+t.amount,0);
  const drinkSum=weekExp.filter(t=>DRINK.test(nameOf(t))).reduce((s,t)=>s+t.amount,0);
  const challenges=[
    {ic:"🍱",t:"Tự nấu, không ăn ngoài",done:eatSum===0,d:eatSum===0?"Tuyệt! tuần này chưa tốn đồng nào ăn ngoài":"Đã chi "+fmtK(eatSum)+" ở quán tuần này"},
    {ic:"☕",t:"Cà phê / trà sữa ≤ 2 lần",done:coffeeCnt<=2,d:coffeeCnt+" lần tuần này"+(coffeeCnt<=2?" — ổn!":" — hơi nhiều")},
    {ic:"🍺",t:"Không bia rượu, nhậu",done:drinkSum===0,d:drinkSum===0?"Tuần này chưa tốn cho bia rượu 👍":"Đã chi "+fmtK(drinkSum)+" bia rượu"},
    {ic:"🛍️",t:"Không mua sắm online",done:shopSum===0,d:shopSum===0?"Không sa đà mua sắm tuần này 🙌":"Đã mua sắm "+fmtK(shopSum)+" tuần này"},
    {ic:"🛒",t:"Gộp đi chợ ≤ 4 lần",done:groceryCnt<=4,d:groceryCnt+" lần đi chợ/siêu thị tuần này"+(groceryCnt<=4?" — gọn!":"")},
    {ic:"🚶",t:"Tự đi, không Grab/taxi",done:taxiSum===0,d:taxiSum===0?"Không tốn tiền xe công nghệ tuần này":"Đã chi "+fmtK(taxiSum)+" đi lại"},
    {ic:"💧",t:"Không tiêu bốc đồng >500k",done:impulse.length===0,d:impulse.length===0?"Chưa có khoản lớn ngoài kế hoạch 👍":impulse.length+" khoản lớn tuần này"},
    {ic:"🚫",t:"Có ngày không chi tiêu",done:noSpend>=1,d:noSpend>=1?(noSpend+" ngày không chi tuần này 👍"):"Chưa có ngày nào tuần này"},
    {ic:"🐷",t:"Có để dành tuần này",done:savedWeek>0,d:savedWeek>0?("Đã để dành "+fmtK(savedWeek)+" 🎉"):"Chưa — thử nút Để dành nhanh phía trên"},
    {ic:"💰",t:"Giữ trong ngân sách tháng",done:budgetTotal>0&&budgetSpentTot<=budgetTotal,d:budgetTotal>0?("Đã chi "+fmtK(budgetSpentTot)+" / "+fmtK(budgetTotal)):"Chưa đặt ngân sách"},
  ];
  // ===== thử thách THÁNG =====
  const monthExpTot=monthExp.reduce((s,t)=>s+t.amount,0);
  const dd=now.getDate(), dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const projMonth=(ym===curYM()&&dd>0)?monthExpTot/dd*dim:monthExpTot;
  const lastMExp=txs.filter(t=>t.type==="expense"&&ymOf(t.date)===addMonths(ym,-1)&&inFocus(t,focus)).reduce((s,t)=>s+t.amount,0);
  const savedMonth=txs.filter(t=>t.type==="transfer"&&t.toWalletId==="w_save"&&ymOf(t.date)===ym).reduce((s,t)=>s+t.amount,0);
  const avgExp3=(()=>{ let s=0,n=0; for(let i=1;i<=3;i++){ const m=addMonths(ym,-i); const e=txs.filter(t=>t.type==="expense"&&ymOf(t.date)===m&&inFocus(t,focus)).reduce((a,t)=>a+t.amount,0); if(e>0){s+=e;n++;} } return n?s/n:0; })();
  const budgetsOK=budgets.length>0 && budgets.every(b=>db.budgetSpent(b,ym)<=b.amount);
  const daysLogged=new Set(monthExp.map(t=>t.date)).size;
  const monthCh=[
    {ic:"🏦",t:"Để dành ≥ 1 triệu tháng này",done:savedMonth>=1000000,d:savedMonth>0?("Đã để dành "+fmtK(savedMonth)+" / 1 tr"):"Chưa để dành tháng này"},
    {ic:"🎯",t:"Không danh mục nào vượt ngân sách",done:budgetsOK,d:budgets.length?(budgetsOK?"Tất cả trong hạn mức 👍":"Có danh mục đang vượt"):"Chưa đặt ngân sách"},
    {ic:"📉",t:"Chi tháng này thấp hơn tháng trước",done:lastMExp>0&&projMonth<lastMExp,d:lastMExp>0?("Dự báo "+fmtK(projMonth)+" · trước "+fmtK(lastMExp)):"Chưa có dữ liệu tháng trước"},
    {ic:"🛟",t:"Quỹ khẩn cấp ≥ 3 tháng chi",done:avgExp3>0&&saved>=avgExp3*3,d:avgExp3>0?("Tiết kiệm "+fmtK(saved)+" / cần "+fmtK(Math.round(avgExp3*3))):"—"},
    {ic:"📅",t:"Ghi chép đều (≥ 20 ngày)",done:daysLogged>=20,d:daysLogged+" ngày có ghi chép tháng này"},
  ];
  const list = chTab==="week"?challenges:monthCh;
  const doneCnt=list.filter(c=>c.done).length;

  // ===== huy hiệu thành tích (lưu lại, đã đạt giữ mãi) =====
  const invested=Math.round(balanceOf("w_invest"));
  const saveStreak=(()=>{ if(budgetTotal<=0) return 0; let n=0,mm=addMonths(curYM(),-1);
    for(let i=0;i<24;i++){ const sp=budgets.reduce((s,b)=>s+db.budgetSpent(b,mm),0); if(sp<=0||sp>budgetTotal) break; n++; mm=addMonths(mm,-1); } return n; })();
  const BADGES=[
    {id:"save1",ic:"🌱",name:"Bắt đầu để dành",cond:saved>0},
    {id:"save1m",ic:"🐷",name:"Bỏ heo 1 triệu",cond:saved>=1000000},
    {id:"save5m",ic:"💎",name:"Tiết kiệm 5 triệu",cond:saved>=5000000},
    {id:"save10m",ic:"👑",name:"Tiết kiệm 10 triệu",cond:saved>=10000000},
    {id:"streak3",ic:"🔥",name:"3 tháng giữ ngân sách",cond:saveStreak>=3},
    {id:"weekperfect",ic:"🏆",name:"Tuần hoàn hảo",cond:challenges.every(c=>c.done)},
    {id:"emergency",ic:"🛟",name:"Quỹ khẩn cấp vững",cond:avgExp3>0&&saved>=avgExp3*3},
    {id:"invest1",ic:"📈",name:"Nhà đầu tư",cond:invested>0},
    {id:"invest10m",ic:"🚀",name:"Rót đầu tư 10 triệu",cond:invested>=10000000},
  ];
  const earnedNow=BADGES.filter(b=>b.cond).map(b=>b.id);
  const everEarned=new Set([...store.get("vn.badges",[]),...earnedNow]);
  useEffect(()=>{ const prev=store.get("vn.badges",[]); const merged=[...new Set([...prev,...earnedNow])];
    if(merged.length!==prev.length) store.set("vn.badges",merged); },[earnedNow.join("|")]);

  // ===== góp định kỳ (DCA): tự áp dụng các lịch tới hạn khi mở tab =====
  useEffect(()=>store.set("vn.autosave",autos),[autos]);
  useEffect(()=>{
    const nowD=new Date(), dd=nowD.getDate(), cm=curYM(); let done=[];
    const next=autos.map(r=>{ if(dd>=r.day && r.last!==cm){
      addTx({type:"transfer",amount:r.amount,date:today(),walletId:saveSrc,toWalletId:r.kind==="invest"?"w_invest":"w_save",note:"Góp định kỳ"});
      done.push(fmtK(r.amount)+(r.kind==="invest"?" → Đầu tư":" → Tiết kiệm")); return Object.assign({},r,{last:cm}); } return r; });
    if(done.length){ setAutos(next); setFlash("🔁 Đã tự góp định kỳ: "+done.join(", ")); setTimeout(()=>setFlash(""),3800); }
  },[]);
  const addRule=()=>{ if(naAmt<=0) return; setAutos(p=>[...p,{id:uid(),kind:naKind,amount:naAmt,day:naDay,last:""}]);
    setFlash("Đã thêm lịch góp "+fmtK(naAmt)+" ngày "+naDay+" hằng tháng"); setTimeout(()=>setFlash(""),2600); };

  const growData=last8YM().map(m=>({ym:m, segs:[{v:walletBalUpto(txs,"w_save",m),c:"var(--income)"},{v:walletBalUpto(txs,"w_invest",m),c:"var(--primary)"}]}));
  const growTotal=growData[growData.length-1].segs.reduce((s,x)=>s+x.v,0);

  return (
    <div>
      <div className="card">
        <div className="sec-h"><h3>📊 Tăng trưởng tài sản</h3>
          <span className="tiny muted" style={{marginLeft:"auto"}}>8 tháng gần nhất</span></div>
        {growTotal>0
          ? <div>
              <GrowthChart data={growData}/>
              <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:10}}>
                <span className="tiny"><span style={{display:"inline-block",width:9,height:9,borderRadius:2,background:"var(--income)",marginRight:5,verticalAlign:"middle"}}></span>Tiết kiệm</span>
                <span className="tiny"><span style={{display:"inline-block",width:9,height:9,borderRadius:2,background:"var(--primary)",marginRight:5,verticalAlign:"middle"}}></span>Đầu tư</span>
              </div>
            </div>
          : <div className="tiny muted" style={{textAlign:"center",padding:"16px 0"}}>Bắt đầu để dành / đầu tư để thấy biểu đồ tăng trưởng 📈</div>}
      </div>
      <div className="card">

const HKINDS={gold:{ic:"🥇",name:"Vàng"},stock:{ic:"📈",name:"Cổ phiếu"},crypto:{ic:"🪙",name:"Crypto"},fund:{ic:"📊",name:"Quỹ"},other:{ic:"💼",name:"Khác"}};
const COIN_IDS={BTC:"bitcoin",ETH:"ethereum",BNB:"binancecoin",SOL:"solana",XRP:"ripple",ADA:"cardano",DOGE:"dogecoin",USDT:"tether",USDC:"usd-coin",TON:"the-open-network",DOT:"polkadot",MATIC:"matic-network",AVAX:"avalanche-2",LINK:"chainlink",TRX:"tron",SHIB:"shiba-inu",LTC:"litecoin",BCH:"bitcoin-cash",NEAR:"near",ATOM:"cosmos",UNI:"uniswap",APT:"aptos",ARB:"arbitrum",OP:"optimism",PEPE:"pepe",SUI:"sui",XLM:"stellar",WBTC:"wrapped-bitcoin",DAI:"dai",FTM:"fantom",ALGO:"algorand",VET:"vechain",ICP:"internet-computer",FIL:"filecoin",HBAR:"hedera-hashgraph",INJ:"injective-protocol",RENDER:"render-token",IMX:"immutable-x",KAS:"kaspa",TIA:"celestia",SEI:"sei-network",FET:"fetch-ai",GALA:"gala",SAND:"the-sandbox",MANA:"decentraland",AAVE:"aave",GRT:"the-graph",MKR:"maker",CRO:"crypto-com-chain",QNT:"quant-network",FLOW:"flow",XMR:"monero",ETC:"ethereum-classic"};
function coinId(name){ const k=(name||"").trim().toUpperCase(); if(COIN_IDS[k]) return COIN_IDS[k]; return (name||"").trim().toLowerCase().replace(/\s+/g,"-")||null; }
const GOLD_PER_OZ={luong:1.205657,chi:0.1205657,gram:0.0321507,oz:1}; // số đơn vị mỗi oz
// Lấy giá online: crypto (CoinGecko, VND) + vàng (giá thế giới × tỷ giá USD/VND). Trả {result:{holdingId:now}, errors:[]}
async function fetchHoldingPrices(items){
  const result={}, errors=[];
  const cryptos=items.filter(h=>h.kind==="crypto"), golds=items.filter(h=>h.kind==="gold");
  if(cryptos.length){
    const ids=[...new Set(cryptos.map(h=>coinId(h.name)).filter(Boolean))];
    try{ const r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids="+encodeURIComponent(ids.join(","))+"&vs_currencies=vnd");
      const j=await r.json();
      cryptos.forEach(h=>{ const id=coinId(h.name); if(j[id]&&j[id].vnd) result[h.id]=Math.round(j[id].vnd); else errors.push(h.name||"crypto"); });
    }catch(e){ errors.push("crypto (mạng)"); }
  }
  if(golds.length){
    try{ const [gr,fr]=await Promise.all([fetch("https://api.gold-api.com/price/XAU"),fetch("https://open.er-api.com/v6/latest/USD")]);
      const gj=await gr.json(), fj=await fr.json(), vndPerOz=(gj.price||0)*((fj.rates&&fj.rates.VND)||0);
      if(vndPerOz>0) golds.forEach(h=>{ result[h.id]=Math.round(vndPerOz*(GOLD_PER_OZ[h.unit||"luong"]||1.205657)); });
      else errors.push("vàng");
    }catch(e){ errors.push("vàng (mạng)"); }
  }
  return {result,errors};
}

function RotSheet({db,dir,saved,invested,onClose}){
  const [amt,setAmt]=useState(0);
  const max=dir==="in"?saved:invested;
  const go=()=>{ const a=Math.min(amt,max); if(a<=0){ alert("Nhập số tiền hợp lệ"); return; }
    if(dir==="in") db.addTx({type:"transfer",amount:a,date:today(),walletId:"w_save",toWalletId:"w_invest",note:"Rót vào đầu tư"});
    else db.addTx({type:"transfer",amount:a,date:today(),walletId:"w_invest",toWalletId:"w_save",note:"Rút đầu tư về tiết kiệm"});
    onClose();
  };
  return (
    <Sheet title={dir==="in"?"Rót tiền vào đầu tư":"Rút về tiết kiệm"} onClose={onClose}>
      <div className="card tight"><div className="kv" style={{borderTop:"none"}}>
        <span className="muted">{dir==="in"?"Tiết kiệm hiện có":"Đang đầu tư"}</span><b>{fmtVND(max)}</b></div></div>
      <div className="field"><label>Số tiền</label><MoneyInput value={amt} onChange={setAmt} kind={dir==="in"?"out":"in"} autoFocus/></div>
      <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
        {[1000000,5000000,10000000].map(v=><button key={v} className="btn ghost sm" onClick={()=>setAmt(a=>a+v)}>+{fmtK(v)}</button>)}
        {max>0 && <button className="btn ghost sm" onClick={()=>setAmt(max)}>Tất cả ({fmtK(max)})</button>}
      </div>
      <div className="note">{dir==="in"? "Chuyển từ ví Tiết kiệm → ví Đầu tư. Số dư tiết kiệm (và tiến độ quỹ du lịch) sẽ giảm tương ứng vì tiền đã chuyển sang đầu tư.":"Chuyển từ ví Đầu tư → ví Tiết kiệm."}</div>
      <button className="btn pri block" style={{marginTop:14}} onClick={go}>{dir==="in"?"Rót":"Rút"} {fmtVND(Math.min(amt,max))}</button>
    </Sheet>
  );
}

function goalStats(g){
  const remaining=Math.max(0,(g.target||0)-(g.saved||0));
  const pct=g.target? (g.saved||0)/g.target : 0;
  let monthsLeft=null,perMonth=null,onTrack=null;
  if(g.deadline){
    const [dy,dm]=g.deadline.split("-").map(Number);
    const now=new Date(); const nowIdx=now.getFullYear()*12+now.getMonth(), dlIdx=dy*12+(dm-1);
    monthsLeft=Math.max(0,dlIdx-nowIdx);
    perMonth = monthsLeft>0? Math.ceil(remaining/monthsLeft/1000)*1000 : remaining;
    if(g.start){
      const [sy,sm]=g.start.split("-").map(Number); const stIdx=sy*12+(sm-1);
      const total=Math.max(1,dlIdx-stIdx), elapsed=Math.max(0,Math.min(total,nowIdx-stIdx));
      onTrack = (g.saved||0) >= g.target*elapsed/total - 1;
    }
  }
  return {remaining,pct,monthsLeft,perMonth,onTrack,done:(g.saved||0)>=(g.target||0)};
}

  const srcW=linked&&db?db.walletById(goal.src):null, dstW=linked&&db?db.walletById(goal.link):null;
  const savedNow=linked&&db?db.balanceOf(goal.link):(goal.saved||0);
  const [dir,setDir]=useState("in");
  const [amt,setAmt]=useState(0);
  const left=Math.max(0,goal.target-savedNow);
  const go=()=>{
    if(amt<=0) return;
    if(linked&&db){
      if(dir==="in") db.addTx({type:"transfer",amount:amt,date:today(),walletId:goal.src,toWalletId:goal.link,note:"Để dành: "+goal.name});
      else db.addTx({type:"transfer",amount:amt,date:today(),walletId:goal.link,toWalletId:goal.src,note:"Rút quỹ: "+goal.name});
    } else { onSave(dir==="in"?amt:-amt); }
    onClose();
  };
  return (
    <Sheet title={(linked?(dir==="in"?"Để dành · ":"Rút khỏi quỹ · "):"Nạp tiền · ")+goal.name} onClose={onClose}>
      {linked &&
        <div className="typeseg" style={{marginBottom:12}}>
          <button className={dir==="in"?"on in":""} onClick={()=>setDir("in")}>＋ Để dành</button>
          <button className={dir==="out"?"on out":""} onClick={()=>setDir("out")}>－ Rút ra</button>
        </div>}
      <div className="field"><label>Số tiền</label><MoneyInput value={amt} onChange={setAmt} kind={dir==="in"?"in":"out"} autoFocus/></div>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {(function(){ const pm=goalStats(Object.assign({},goal,{saved:savedNow})).perMonth; return (dir==="in"&&pm)? <button className="btn ghost sm" style={{borderColor:"var(--primary)",color:"var(--primary-d)",fontWeight:800}} onClick={()=>setAmt(pm)}>Mức/tháng ({fmtK(pm)})</button>:null; })()}
        {[500000,1000000,2000000].map(v=><button key={v} className="btn ghost sm" onClick={()=>setAmt(a=>a+v)}>+{fmtK(v)}</button>)}
        {dir==="in"&&left>0 && <button className="btn ghost sm" onClick={()=>setAmt(left)}>Đủ ({fmtK(left)})</button>}
        {dir==="out"&&savedNow>0 && <button className="btn ghost sm" onClick={()=>setAmt(savedNow)}>Tất cả ({fmtK(savedNow)})</button>}
      </div>
      {linked
        ? <div className="note">🔗 {dir==="in"? ("Chuyển "+((srcW&&srcW.name)||"?")+" → "+((dstW&&dstW.name)||"?")) : ("Chuyển "+((dstW&&dstW.name)||"?")+" → "+((srcW&&srcW.name)||"?"))}. Số dư các ví thay đổi thật.</div>
        : <div className="note">💡 Mục tiêu là bộ theo dõi tiến độ — nạp tiền chỉ cập nhật tiến độ, không trừ số dư ví.</div>}
      <button className="btn pri block" style={{marginTop:14}} onClick={go}>{dir==="in"?"Để dành":"Rút"} {fmtVND(amt)}</button>
    </Sheet>
  );
}

function Debts({db}){
  const {debts,setDebts,members,memberById,addTx,wallets}=db;
  const [edit,setEdit]=useState(null);
  const [pay,setPay]=useState(null);
  const borrow=debts.filter(d=>d.kind==="borrow"), lend=debts.filter(d=>d.kind==="lend");
  const totBorrow=borrow.reduce((s,d)=>s+d.remaining,0), totLend=lend.reduce((s,d)=>s+d.remaining,0);

  const card=d=>{
    const mem=memberById(d.memberId), paid=d.principal-d.remaining, pct=d.principal?paid/d.principal:0;
    const isBorrow=d.kind==="borrow";
    return (
      <div className="card" key={d.id}>
        <div className="row" style={{padding:0,alignItems:"flex-start"}}>
          <span className="av" style={{background:isBorrow?"var(--expense-l)":"var(--income-l)"}}>{isBorrow?"📉":"📈"}</span>

            <div className="ti">{d.counterparty}</div>
            <div className="tiny muted" style={{margin:"3px 0 4px"}}>
              {mem&&<span className="badge">{mem.name}</span>}
              {d.dueDate?("  · hạn "+fmtDateVN(d.dueDate)):""}{d.note?("  · "+d.note):""}</div>
            <div className="bar"><i style={{width:Math.min(100,pct*100)+"%",background:isBorrow?"var(--expense)":"var(--income)"}}></i></div>
          </div>
        </div>
        <div className="kv" style={{marginTop:8,borderTop:"none"}}>
          <span className="muted">Còn lại</span>
          <b style={{color:isBorrow?"var(--expense)":"var(--income)",fontSize:16}}>{fmtVND(d.remaining)}</b></div>
        {d.remaining>0 &&
          <button className="btn pri sm block" onClick={()=>setPay(d)}>{isBorrow?"💸 Trả bớt":"💰 Thu về"}</button>}
      </div>
    );
  };

  return (
    <div>
      <div className="stat2">
        <div className="stat"><div className="t">📉 Mình đang nợ</div><div className="v out">{fmtVND(totBorrow)}</div></div>
        <div className="stat"><div className="t">📈 Người ta nợ mình</div><div className="v in">{fmtVND(totLend)}</div></div>
      </div>

      <div className="sec-h" style={{padding:"0 2px"}}><h3>Khoản vay (mình nợ)</h3>
        <button className="addbtn" onClick={()=>setEdit({kind:"borrow"})}>＋ Thêm</button></div>
      {borrow.length? borrow.map(card) : <div className="card"><Empty e="✅" title="Không có khoản nợ" sub="Bạn chưa nợ ai. Tuyệt vời!"/></div>}

      <div className="sec-h" style={{padding:"6px 2px 0"}}><h3>Cho vay (người ta nợ)</h3>
        <button className="addbtn" onClick={()=>setEdit({kind:"lend"})}>＋ Thêm</button></div>
      {lend.length? lend.map(card) : <div className="card"><Empty e="🤝" title="Chưa cho ai vay" sub="Ghi lại khi cho người khác mượn tiền."/></div>}

      {edit!==null &&
        <DebtForm db={db} init={edit} onClose={()=>setEdit(null)}
          onSave={d=> setDebts(p=> p.some(x=>x.id===d.id)? p.map(x=>x.id===d.id?d:x):[...p,d])}
          onDel={id=> setDebts(p=>p.filter(x=>x.id!==id))}/>}
      {pay!==null &&
        <DebtPay db={db} debt={pay} onClose={()=>setPay(null)}
          onPay={(amt,walletId)=>{
            setDebts(p=>p.map(x=>x.id===pay.id?Object.assign({},x,{remaining:Math.max(0,x.remaining-amt)}):x));
            if(walletId){
              if(pay.kind==="borrow") addTx({type:"expense",amount:amt,date:today(),walletId,categoryId:"c_debt",note:"Trả nợ: "+pay.counterparty});
              else addTx({type:"income",amount:amt,date:today(),walletId,categoryId:"i_collect",note:"Thu nợ: "+pay.counterparty});
            }
          }}/>}
    </div>
  );
}

  };
  const delWallet=id=>{ if(confirm("Xóa ví? (Giao dịch cũ vẫn giữ lại)")) setWallets(p=>p.filter(w=>w.id!==id)); };

  const ALLKEYS=["vn.members","vn.wallets","vn.cats","vn.tx","vn.budgets","vn.goals","vn.bills","vn.debts","vn.holdings","vn.autosave","vn.recurring","vn.badges","vn.incomegoal","vn.theme","vn.dataVersion"];
  const exportData=()=>{
    const data={}, ks=new Set(ALLKEYS);
    try{ Object.keys(localStorage).forEach(k=>{ if(k.indexOf("vn.")===0) ks.add(k); }); }catch(e){}
    ks.forEach(k=>{ const v=store.get(k,null); if(v!==null) data[k]=v; });
    const blob=new Blob([JSON.stringify({app:"vinha",version:1,exportedAt:today(),data},null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="vinha-saoluu-"+today()+".json"; a.click();
  };
  const importData=e=>{
    const f=e.target.files&&e.target.files[0]; e.target.value=""; if(!f) return;
    const rd=new FileReader();
    rd.onload=()=>{ try{ const j=JSON.parse(rd.result); const d=(j&&j.data)?j.data:j;
        if(!d||typeof d!=="object"||!d["vn.tx"]){ alert("File sao lưu không hợp lệ (thiếu dữ liệu giao dịch)."); return; }
        if(!confirm("Khôi phục sẽ GHI ĐÈ toàn bộ dữ liệu hiện tại bằng dữ liệu trong file. Tiếp tục?")) return;
        Object.keys(d).forEach(k=>{ if(k.indexOf("vn.")===0) store.set(k,d[k]); });
        alert("✅ Đã khôi phục. Trang sẽ tải lại."); location.reload();
      }catch(err){ alert("Không đọc được file: "+err.message); } };
    rd.readAsText(f);
  };
  const resetAll=()=>{ if(confirm("Xóa toàn bộ dữ liệu đang lưu và nạp lại dữ liệu gốc? Không thể hoàn tác.")){
    ["vn.members","vn.wallets","vn.tx","vn.budgets","vn.goals","vn.bills","vn.debts","vn.cats"].forEach(k=>store.del(k));
    location.reload();
  }};
  const hasImport = typeof window!=="undefined" && window.VINHA_DATA;
  const reimport=()=>{
    if(!hasImport){ alert("Không tìm thấy data.js (dữ liệu MoneyLover)."); return; }
    if(confirm("Ghi đè toàn bộ bằng dữ liệu đã import từ MoneyLover? Mọi thay đổi hiện tại sẽ mất.")){
      const D=window.VINHA_DATA;
      store.set("vn.members",D.members); store.set("vn.wallets",D.wallets); store.set("vn.cats",D.categories);
      store.set("vn.tx",D.txs); store.set("vn.budgets",D.budgets); store.set("vn.goals",D.goals||[]);
      store.set("vn.bills",D.bills||[]); store.set("vn.debts",D.debts||[]);
      store.set("vn.dataVersion",D.version||"manual");
      location.reload();
    }
  };

  const typeName={cash:"Tiền mặt",bank:"Ngân hàng",ewallet:"Ví điện tử",saving:"Tiết kiệm",invest:"Đầu tư"};

  return (
    <div>
      <div className="hero" style={{background:"linear-gradient(135deg,#5b6ef0,#3b4fd6 60%,#6b4fd6)"}}>
        <div className="lab">🏦 Tổng tài sản gia đình</div>
        <div className="big">{fmtVND(familyTotal())}</div>
        <div className="sub">{members.length} thành viên · {wallets.length} ví</div>
      </div>

      <div className="sec-h" style={{padding:"0 2px"}}><h3>👪 Thành viên</h3>
        <button className="addbtn" onClick={()=>setMEdit({})}>＋ Thêm</button></div>
      <div className="card tight">
        {members.map(m=>
          <div className="row" key={m.id}>
            <span className="av" style={{background:m.color+"22"}}>{m.emoji}</span>
            <div className="grow" onClick={()=>setMEdit(m)}>
              <div className="ti">{m.name} <span className="badge">{m.relation}</span></div>
              <div className="desc">{fmtVND(memberBalance(m.id))} · {wallets.filter(w=>w.memberId===m.id).length} ví</div></div>
            <button className="badge" style={{padding:"6px 9px"}} onClick={()=>delMember(m.id)}>🗑</button>
          </div>)}
      </div>

      <div className="sec-h" style={{padding:"6px 2px 0"}}><h3>💳 Ví / Tài khoản</h3>
        <button className="addbtn" onClick={()=>setWEdit({})}>＋ Thêm</button></div>
      {members.map(m=>{
        const ws=wallets.filter(w=>w.memberId===m.id);
        if(!ws.length) return null;
        return (
          <div className="card tight" key={m.id}>
            <div className="tiny" style={{fontWeight:800,color:m.color,marginBottom:2}}>{m.emoji} {m.name}</div>
            {ws.map(w=>
              <div className="row" key={w.id}>
                <span className="av" style={{background:"var(--bg2)"}}>{w.icon}</span>
                <div className="grow" onClick={()=>setWEdit(w)}>
                  <div className="ti">{w.name}</div><div className="desc">{typeName[w.type]||w.type}</div></div>
                <div style={{textAlign:"right"}}>
                  <div className="amt">{fmtVND(balanceOf(w.id))}</div>
                  <button className="badge" style={{padding:"4px 8px"}} onClick={()=>delWallet(w.id)}>Xóa</button></div>
              </div>)}
          </div>
        );
      })}

      <div className="card" style={{marginTop:6}}>
        <div className="sec-h"><h3>🎨 Giao diện</h3></div>
        <div className="seg" style={{marginBottom:12}}>
          <button className={!theme.dark?"on":""} onClick={()=>setTheme(t=>({...t,dark:false}))}>☀️ Sáng</button>
          <button className={theme.dark?"on":""} onClick={()=>setTheme(t=>({...t,dark:true}))}>🌙 Tối</button>
        </div>
        <div className="tiny muted" style={{marginBottom:8,fontWeight:700}}>Tông màu nhấn</div>
        <div className="swatches">
          {[["emerald","#0e9f6e"],["blue","#3b82f6"],["violet","#7c6cf0"],["rose","#e0699f"]].map(([k,c])=>
            <button key={k} className={"swatch"+(theme.accent===k?" on":"")} style={{background:c}} aria-label={"Tông "+k} onClick={()=>setTheme(t=>({...t,accent:k}))}></button>)}
        </div>
      </div>

      <div className="card" style={{marginTop:6}}>
        <div className="sec-h"><h3>⚙️ Dữ liệu</h3></div>
        <button className="btn block" onClick={exportData}>⬇️ Sao lưu ra file JSON</button>
        <input id="vn-import-file" type="file" accept="application/json,.json" style={{display:"none"}} onChange={importData}/>
        <button className="btn block" style={{marginTop:10}} onClick={()=>{const el=document.getElementById("vn-import-file"); if(el) el.click();}}>⬆️ Khôi phục từ file sao lưu</button>
        {hasImport &&
          <button className="btn block" style={{marginTop:10}} onClick={reimport}>🔁 Nạp lại dữ liệu MoneyLover ({window.VINHA_DATA.source||"đã import"})</button>}
        <button className="btn danger block" style={{marginTop:10}} onClick={resetAll}>♻️ Xóa &amp; nạp lại dữ liệu gốc</button>
        <div className="note" style={{marginTop:12}}>Dữ liệu lưu cục bộ trên máy bạn (localStorage). Đây là bản prototype — chưa có server, dữ liệu không đồng bộ giữa các thiết bị.</div>
      </div>

      <div className="empty tiny" style={{padding:"6px 0 0"}}>VíNhà · bản thử nghiệm · made with 💚</div>

      {mEdit!==null &&
        <MemberForm init={mEdit} onClose={()=>setMEdit(null)}
          onSave={m=> setMembers(p=> p.some(x=>x.id===m.id)? p.map(x=>x.id===m.id?m:x):[...p,m])}/>}
      {wEdit!==null &&
        <WalletForm members={members} init={wEdit} onClose={()=>setWEdit(null)}
          onSave={w=> setWallets(p=> p.some(x=>x.id===w.id)? p.map(x=>x.id===w.id?w:x):[...p,w])}/>}
    </div>
  );
}
function MemberForm({init,onClose,onSave}){
  const editing=init&&init.id;
  const EMO=["👨","👩","🧒","👦","👧","👴","👵","🧑","👶","🐱"];
  const [name,setName]=useState(init.name||"");
  const [relation,setRelation]=useState(init.relation||"");
  const [emoji,setEmoji]=useState(init.emoji||"🧑");
  const [color,setColor]=useState(init.color||MEMBER_COLORS[0]);
  return (
    <Sheet title={editing?"Sửa thành viên":"Thêm thành viên"} onClose={onClose}>
      <div className="two">
        <div className="field"><label>Tên</label><input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="VD: Minh"/></div>
        <div className="field"><label>Quan hệ</label><input className="input" value={relation} onChange={e=>setRelation(e.target.value)} placeholder="Vợ/Chồng/Con"/></div>
      </div>
      <div className="field"><label>Biểu tượng</label>
        <div className="emoji-pick">{EMO.map(e=><button key={e} className={emoji===e?"on":""} onClick={()=>setEmoji(e)}>{e}</button>)}</div></div>
      <div className="field"><label>Màu</label>
        <div className="swatches">{MEMBER_COLORS.map(cl=><button key={cl} className={"swatch"+(color===cl?" on":"")} style={{background:cl}} onClick={()=>setColor(cl)}></button>)}</div></div>
      <button className="btn pri block" onClick={()=>{ if(name){ onSave({id:editing?init.id:uid(),name,relation,emoji,color}); onClose(); } else alert("Nhập tên"); }}>
        {editing?"Lưu":"Thêm thành viên"}</button>
    </Sheet>
  );
}
function WalletForm({members,init,onClose,onSave}){
  const editing=init&&init.id;
  const ICONS=["💵","🏦","📱","💳","🐷","💰","🪙","🏧"];
  const [name,setName]=useState(init.name||"");
  const [memberId,setMemberId]=useState(init.memberId||(members[0]&&members[0].id));
  const [type,setType]=useState(init.type||"cash");
  const [icon,setIcon]=useState(init.icon||"💵");
  const [opening,setOpening]=useState(init.opening||0);
  return (
    <Sheet title={editing?"Sửa ví":"Thêm ví / tài khoản"} onClose={onClose}>
      <div className="field"><label>Tên ví</label><input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="VD: Vietcombank"/></div>
      <div className="two">
        <div className="field"><label>Của ai</label>
          <select className="select" value={memberId} onChange={e=>setMemberId(e.target.value)}>
            {members.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}</select></div>
        <div className="field"><label>Loại</label>
          <select className="select" value={type} onChange={e=>setType(e.target.value)}>
            <option value="cash">Tiền mặt</option><option value="bank">Ngân hàng</option><option value="ewallet">Ví điện tử</option></select></div>
      </div>
      <div className="field"><label>Biểu tượng</label>
        <div className="emoji-pick">{ICONS.map(e=><button key={e} className={icon===e?"on":""} onClick={()=>setIcon(e)}>{e}</button>)}</div></div>
      <div className="field"><label>{editing?"Số dư ban đầu (gốc)":"Số dư hiện có"}</label><MoneyInput value={opening} onChange={setOpening}/></div>
      {editing && <div className="note">Lưu ý: đây là số dư <b>ban đầu</b> của ví. Số dư hiển thị = số dư ban đầu ± các giao dịch.</div>}
      <button className="btn pri block" style={{marginTop:12}} onClick={()=>{ if(name){ onSave({id:editing?init.id:uid(),name,memberId,type,icon,opening}); onClose(); } else alert("Nhập tên ví"); }}>
        {editing?"Lưu":"Thêm ví"}</button>
    </Sheet>
  );
}

/* Nếu đã đăng nhập: kéo dữ liệu từ đám mây về TRƯỚC khi render (giới hạn 4s), rồi mới mount */
(async ()=>{
  try{
    if(SB){
      const s=await SB.auth.getSession();
      if(s&&s.data&&s.data.session){
        window.__vinhaAuthed=true;
        try{
          const remote=await Promise.race([ CLOUD.pull(), new Promise(res=>setTimeout(()=>res(null),4000)) ]);
          if(remote && Object.keys(remote).length) CLOUD.apply(remote);
        }catch(e){ console.warn("cloud pull",e); }
      }
    }
  }catch(e){ console.warn("cloud init",e); }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
})();
</script>
</body>
</html>
