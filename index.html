<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>VíNhà — Quản lý tài chính cá nhân &amp; gia đình</title>

<!-- React + Babel (không cần build, biên dịch JSX ngay trên trình duyệt) -->
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js"></script>
<!-- Supabase (đồng bộ đám mây: đăng nhập + dữ liệu riêng tư theo tài khoản) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
  :root{
    --bg:#eef3f1; --bg2:#e3ebe8;
    --card:#ffffff; --card-2:#f6faf8;
    --ink:#102a20; --muted:#5f7a6f; --muted-2:#93a89e;
    --line:#e4ece8; --line-2:#d6e2dc;
    --primary:#0e9f6e; --primary-d:#0a7d56; --primary-l:#e6f6ef;
    --income:#0ea05a; --income-l:#e6f6ec;
    --expense:#e5484d; --expense-l:#fdebec;
    --warn:#e08a2b; --warn-l:#fbf0e0;
    --info:#3b82f6; --info-l:#e8f0fe;
    --radius:18px; --radius-sm:12px; --radius-pill:999px;
    --shadow:0 8px 24px rgba(16,40,32,.08); --shadow-sm:0 2px 8px rgba(16,40,32,.06);
    --shadow-lg:0 18px 44px rgba(16,40,32,.18);
    --ease:cubic-bezier(.2,.8,.2,1); --ring:0 0 0 3px rgba(14,159,110,.20);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:
      radial-gradient(1100px 520px at 85% -10%, #d8efe5 0%, transparent 60%),
      radial-gradient(900px 520px at -10% 108%, #dcebff 0%, transparent 55%),
      var(--bg);
    color:var(--ink); -webkit-font-smoothing:antialiased; -webkit-tap-highlight-color:transparent;
  }
  #root{min-height:100%}
  button{font-family:inherit;cursor:pointer;border:none;outline:none;color:inherit}
  input,select,textarea{font-family:inherit;color:inherit}
  a{color:var(--primary)}
  button,input,select,textarea{transition:background .16s var(--ease),border-color .16s var(--ease),color .16s var(--ease),box-shadow .16s var(--ease),transform .12s var(--ease)}
  button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:none;box-shadow:var(--ring)}
  @media (prefers-reduced-motion:reduce){ *{animation-duration:.01ms!important;transition-duration:.01ms!important} }
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#cdddd6;border-radius:9px}

  .wrap{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;
    background:linear-gradient(180deg,rgba(255,255,255,.35),rgba(255,255,255,0) 240px)}
  .screen{flex:1;padding:12px 14px 96px}

  /* ===== Top bar ===== */
  .topbar{position:sticky;top:0;z-index:30;padding:12px 14px 10px;
    background:linear-gradient(180deg,rgba(238,243,241,.97),rgba(238,243,241,.82));backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line)}
  .toprow{display:flex;align-items:center;gap:10px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:900;letter-spacing:.2px;font-size:19px}
  .logo{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:18px;
    background:linear-gradient(145deg,var(--primary),var(--primary-d));color:#fff;
    box-shadow:0 6px 14px rgba(14,159,110,.36)}
  .brand small{display:block;font-weight:600;color:var(--muted);font-size:10.5px;letter-spacing:.2px;margin-top:-2px}
  .month-nav{margin-left:auto;display:flex;align-items:center;gap:2px;background:var(--card);border:1px solid var(--line);
    border-radius:11px;padding:3px;box-shadow:var(--shadow)}
  .month-nav b{font-size:13px;min-width:96px;text-align:center}
  .mbtn{width:30px;height:28px;border-radius:8px;background:transparent;font-size:16px;color:var(--muted);display:grid;place-items:center}
  .mbtn:active{background:var(--bg2)}

  /* member chips */
  .chips{display:flex;gap:7px;overflow-x:auto;padding:11px 1px 2px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:6px 12px 6px 7px;border-radius:999px;
    background:var(--card);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--muted);box-shadow:var(--shadow)}
  .chip .dot{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:13px}
  .chip.on{border-color:transparent;color:#fff;background:linear-gradient(145deg,var(--primary),var(--primary-d));box-shadow:0 6px 14px rgba(14,159,110,.3)}
  .chip.on .dot{background:rgba(255,255,255,.25)!important}

  /* ===== Cards ===== */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:15px;margin-bottom:13px;box-shadow:var(--shadow)}
  .card.tight{padding:13px}
  .sec-h{display:flex;align-items:center;gap:8px;margin:0 0 11px}
  .sec-h h3{margin:0;font-size:15px;font-weight:800}
  .sec-h .more{margin-left:auto;font-size:12.5px;font-weight:700;color:var(--primary);background:var(--primary-l);padding:5px 10px;border-radius:9px}
  .muted{color:var(--muted)}
  .tiny{font-size:11.5px}

  /* hero balance */
  .hero{position:relative;overflow:hidden;border:none;color:#fff;border-radius:22px;padding:18px 18px 16px;margin-bottom:13px;
    background:linear-gradient(135deg,#0fae78 0%,#0a7d56 58%,#0b6b6b 100%);box-shadow:0 16px 34px rgba(11,107,90,.34)}
  .hero::after{content:"";position:absolute;right:-50px;top:-60px;width:190px;height:190px;border-radius:50%;background:rgba(255,255,255,.10)}
  .hero::before{content:"";position:absolute;right:30px;bottom:-70px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.07)}
  .hero .lab{font-size:12.5px;opacity:.9;font-weight:600;display:flex;align-items:center;gap:7px}
  .hero .big{font-size:31px;font-weight:900;letter-spacing:.3px;margin:5px 0 2px;position:relative}
  .hero .sub{font-size:12px;opacity:.85;position:relative}
  .hero .eye{margin-left:auto;background:rgba(255,255,255,.16);width:30px;height:30px;border-radius:9px;display:grid;place-items:center;font-size:15px;color:#fff}

  .stat2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px;box-shadow:var(--shadow)}
  .stat .t{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
  .stat .v{font-size:18.5px;font-weight:900;margin-top:5px}
  .stat .ic{width:24px;height:24px;border-radius:8px;display:grid;place-items:center;font-size:13px;font-weight:800}
  .v.in{color:var(--income)} .v.out{color:var(--expense)}
  .amt,.stat .v,.hero .big,.money-in,.donut .ctr b,.legend .lg b,.kv b,.month-nav b{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .stat{transition:transform .12s var(--ease),box-shadow .16s var(--ease)} .stat:active{transform:scale(.985)}
  .hero .eye:active{transform:scale(.9)} .hero .big{letter-spacing:.2px}

  /* rows */
  .row{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
  .row:first-child{border-top:none}
  .av{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;font-size:19px;flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(16,40,32,.05)}
  .row .grow{flex:1;min-width:0}
  .row .ti{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .desc{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .amt{font-weight:800;font-size:14.5px;text-align:right;white-space:nowrap}
  .amt.in{color:var(--income)} .amt.out{color:var(--expense)} .amt.tr{color:var(--info)}
  .pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 7px;border-radius:7px}
  .pill.g{background:var(--primary-l);color:var(--primary-d)}
  .pill.r{background:var(--expense-l);color:var(--expense)}
  .pill.w{background:var(--warn-l);color:var(--warn)}
  .pill.b{background:var(--info-l);color:var(--info)}

  .day-h{font-size:12px;font-weight:800;color:var(--muted);margin:14px 2px 2px;display:flex;justify-content:space-between}

  /* progress */
  .bar{height:9px;border-radius:9px;background:var(--bg2);overflow:hidden;margin-top:8px;box-shadow:inset 0 0 0 1px rgba(16,40,32,.04)}
  .bar > i{display:block;height:100%;border-radius:9px;background:linear-gradient(90deg,var(--primary),var(--primary-d));transition:width .45s var(--ease)}
  .bar.warn > i{background:linear-gradient(90deg,#f2b134,#e08a2b)}
  .bar.over > i{background:linear-gradient(90deg,#f0686c,#e5484d)}

  /* segmented */
  .seg{display:flex;background:var(--bg2);border-radius:13px;padding:4px;gap:4px;margin-bottom:13px}
  .seg button{flex:1;padding:9px 6px;border-radius:10px;font-weight:700;font-size:13px;color:var(--muted);background:transparent;transition:.15s}
  .seg button.on{background:var(--card);color:var(--primary-d);box-shadow:var(--shadow-sm)}
  .seg.compact button{font-size:12px;padding:9px 3px;letter-spacing:-.2px;white-space:nowrap}
  .sbox{position:relative}
  .sbox.hid{opacity:.5}
  .sbar{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px dashed var(--muted);border-radius:10px;padding:4px 6px 4px 10px;margin-bottom:7px}
  .sbar .st{font-size:11px;font-weight:700;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sbar button{flex:0 0 auto;background:var(--card);border:1px solid var(--line,rgba(0,0,0,.12));border-radius:7px;width:30px;height:28px;font-size:13px;color:var(--ink);font-weight:700}
  .sbar button:disabled{opacity:.35}
  .sbar button.on{background:var(--expense-l);border-color:var(--expense)}
  .scol{cursor:pointer}
  .seg button:active{transform:scale(.97)} .chip:active{transform:scale(.96)} .addbtn:active{transform:scale(.95)}

  /* charts */
  .donut-wrap{display:flex;align-items:center;gap:16px}
  .donut{position:relative;flex:0 0 auto}
  .donut .ctr{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .donut .ctr b{font-size:15px;font-weight:900;display:block}
  .donut .ctr small{font-size:10.5px;color:var(--muted)}
  .legend{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
  .legend .lg{display:flex;align-items:center;gap:8px;font-size:12.5px}
  .legend .sw{width:11px;height:11px;border-radius:4px;flex:0 0 auto}
  .legend .lg b{margin-left:auto;font-weight:800}
  .trend{display:flex;align-items:flex-end;gap:9px;height:120px;padding-top:8px}
  .trend .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
  .trend .pair{display:flex;align-items:flex-end;gap:3px;height:100%;width:100%;justify-content:center}
  .trend .b{width:11px;border-radius:5px 5px 2px 2px;min-height:3px;transition:height .4s}
  .trend .b.in{background:linear-gradient(180deg,#34d399,#0ea05a)}
  .trend .b.out{background:linear-gradient(180deg,#fb7185,#e5484d)}
  .trend .lb{font-size:10.5px;color:var(--muted);font-weight:600}
  .trend .col.cur .lb{color:var(--primary-d);font-weight:800}

  /* ring */
  .ring{position:relative;flex:0 0 auto}
  .ring .ctr{position:absolute;inset:0;display:grid;place-items:center;font-size:13px;font-weight:900}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 15px;border-radius:13px;font-weight:800;font-size:14px;
    background:var(--card);border:1px solid var(--line-2);color:var(--ink);box-shadow:var(--shadow)}
  .btn:active{transform:translateY(1px)}
  .btn.pri{background:linear-gradient(145deg,var(--primary),var(--primary-d));color:#fff;border-color:transparent;box-shadow:0 8px 18px rgba(14,159,110,.32)}
  .btn.block{width:100%}
  .btn.sm{padding:8px 12px;font-size:13px;border-radius:11px}
  .btn.danger{color:var(--expense);background:var(--expense-l);border-color:transparent;box-shadow:none}
  .btn.ghost{background:var(--bg2);border-color:transparent;box-shadow:none}
  .addbtn{margin-left:auto;background:var(--primary-l);color:var(--primary-d);font-weight:800;font-size:13px;padding:7px 12px;border-radius:10px;display:inline-flex;gap:5px;align-items:center}

  /* empty */
  .empty{text-align:center;padding:30px 16px;color:var(--muted)}
  .empty .e{font-size:34px;margin:0 auto 10px;width:72px;height:72px;border-radius:50%;display:grid;place-items:center;background:var(--bg2)}
  .empty b{display:block;color:var(--ink);font-size:15px;margin-bottom:4px}

  /* FAB */
  .fab{position:fixed;left:50%;transform:translateX(calc(-50% + 200px));bottom:84px;z-index:40;width:56px;height:56px;border-radius:50%;
    background:linear-gradient(145deg,var(--primary),var(--primary-d));color:#fff;font-size:30px;font-weight:300;display:grid;place-items:center;
    box-shadow:0 12px 26px rgba(14,159,110,.5);line-height:1}
  .fab:active{transform:translateX(calc(-50% + 200px)) scale(.95)}
  @media(max-width:520px){ .fab{right:18px;left:auto;transform:none} .fab:active{transform:scale(.95)} }

  /* bottom nav */
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:35}
  .nav-in{max-width:480px;margin:0 auto;display:flex;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.99));
    backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:6px 4px 9px}
  .nav-in button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;padding:7px 2px 5px;margin:0 2px;border-radius:13px;color:var(--muted-2);font-size:10.5px;font-weight:700}
  .nav-in button .ni{font-size:21px;line-height:1;filter:grayscale(.4) opacity(.65);transition:transform .15s var(--ease)}
  .nav-in button.on{color:var(--primary-d);background:var(--primary-l)}
  .nav-in button.on .ni{filter:none;transform:translateY(-1px) scale(1.06)}
  .nav-in button:active .ni{transform:scale(.88)}

  /* sheet / modal */
  .sheet-bg{position:fixed;inset:0;z-index:60;background:rgba(16,30,24,.46);backdrop-filter:blur(2px);display:flex;align-items:flex-end;justify-content:center;animation:fade .2s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{width:100%;max-width:480px;max-height:92vh;overflow:auto;background:var(--bg);border-radius:22px 22px 0 0;padding:8px 16px 24px;
    box-shadow:var(--shadow-lg);animation:up .26s cubic-bezier(.2,.8,.2,1)}
  @keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .grab{width:42px;height:5px;border-radius:5px;background:#c8d6cf;margin:6px auto 12px}
  .sheet-h{display:flex;align-items:center;margin-bottom:14px}
  .sheet-h h3{margin:0;font-size:18px;font-weight:900}
  .sheet-h .x{margin-left:auto;width:32px;height:32px;border-radius:10px;background:var(--bg2);font-size:17px;color:var(--muted);display:grid;place-items:center}

  /* forms */
  .field{margin-bottom:13px}
  .field > label{display:block;font-size:12.5px;font-weight:800;color:var(--muted);margin-bottom:7px}
  .input,.select,.textarea{width:100%;padding:13px 14px;border-radius:13px;border:1.5px solid var(--line-2);background:var(--card);font-size:15px;font-weight:600}
  .input:focus,.select:focus,.textarea:focus{border-color:var(--primary);box-shadow:var(--ring)}
  .textarea{min-height:64px;resize:vertical;font-weight:500}
  .money-in{font-size:25px;font-weight:900;text-align:center;padding:14px;color:var(--ink)}
  .money-in.in{color:var(--income)} .money-in.out{color:var(--expense)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .catgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;max-height:222px;overflow:auto;padding:2px}
  .catbtn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 4px;border-radius:13px;background:var(--card);border:1.5px solid var(--line);font-size:10.5px;font-weight:700;color:var(--muted);text-align:center}
  .catbtn .ic{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;font-size:19px}
  .catbtn small{line-height:1.15;height:23px;display:flex;align-items:center}
  .catbtn.on{border-color:var(--primary);color:var(--ink);background:var(--primary-l)}
  .typeseg{display:flex;gap:6px;margin-bottom:14px}
  .typeseg button{flex:1;padding:11px;border-radius:13px;font-weight:800;font-size:13.5px;background:var(--bg2);color:var(--muted)}
  .typeseg button.on.out{background:var(--expense);color:#fff}
  .typeseg button.on.in{background:var(--income);color:#fff}
  .typeseg button.on.tr{background:var(--info);color:#fff}

  .badge{font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:7px;background:var(--bg2);color:var(--muted)}
  .kv{display:flex;justify-content:space-between;padding:7px 0;font-size:13.5px;border-top:1px dashed var(--line);}
  .kv:first-child{border-top:none}
  .kv b{font-weight:800}
  .swatches{display:flex;gap:8px;flex-wrap:wrap}
  .swatch{width:30px;height:30px;border-radius:50%;border:3px solid transparent}
  .swatch.on{border-color:var(--ink)}
  .emoji-pick{display:flex;gap:6px;flex-wrap:wrap}
  .emoji-pick button{width:38px;height:38px;border-radius:11px;background:var(--card);border:1.5px solid var(--line);font-size:19px}
  .emoji-pick button.on{border-color:var(--primary);background:var(--primary-l)}
  .note{background:var(--info-l);color:#2b5cab;border-radius:12px;padding:10px 12px;font-size:12px;line-height:1.5}
  /* micro-interactions: phản hồi nhấn nhất quán */
  .btn.pri:active{filter:brightness(.95)} .btn:disabled{opacity:.5;pointer-events:none}
  .sheet-h .x:active{transform:scale(.9)} .catbtn:active{transform:scale(.95)} .emoji-pick button:active{transform:scale(.92)}
  .swatch:active{transform:scale(.9)} .mbtn:active{transform:scale(.88)} .eye:active{transform:scale(.9)}
  .trk{stroke:var(--bg2)}

  /* ===== #13 Giao diện tối + tông màu (vn.theme) ===== */
  body.dark{
    --bg:#0e1512; --bg2:#1a241f; --card:#151e19; --card-2:#101713;
    --ink:#e7f2ec; --muted:#8aa89a; --muted-2:#5d7a6a;
    --line:#243029; --line-2:#2e3b34;
    --primary-l:#11281d; --income-l:#11281c; --expense-l:#2b1719; --warn-l:#2a2113; --info-l:#15243a;
    --shadow:0 8px 24px rgba(0,0,0,.42); --shadow-sm:0 2px 8px rgba(0,0,0,.32); --shadow-lg:0 18px 44px rgba(0,0,0,.6);
  }
  body.dark{ background:
    radial-gradient(1100px 520px at 85% -10%, rgba(22,48,36,.5) 0%, transparent 60%),
    radial-gradient(900px 520px at -10% 108%, rgba(21,36,58,.45) 0%, transparent 55%), var(--bg); }
  body.dark .wrap{ background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,0) 240px) }
  body.dark .topbar{ background:linear-gradient(180deg,rgba(14,21,18,.97),rgba(14,21,18,.8)) }
  body.dark .nav-in{ background:linear-gradient(180deg,rgba(18,26,21,.9),rgba(9,14,11,.99)) }
  body.dark .note{ background:#15243a; color:#a8c6f3 }
  body.dark .grab{ background:#3a4a42 }
  body.dark ::-webkit-scrollbar-thumb{ background:#2e3b34 }
  /* tông màu nhấn */
  body.accent-blue{ --primary:#3b82f6; --primary-d:#2563eb; --primary-l:#e8f0fe; --ring:0 0 0 3px rgba(59,130,246,.22) }
  body.accent-violet{ --primary:#7c6cf0; --primary-d:#5a4ce0; --primary-l:#eeecfe; --ring:0 0 0 3px rgba(124,108,240,.22) }
  body.accent-rose{ --primary:#e0699f; --primary-d:#c94f86; --primary-l:#fce8f1; --ring:0 0 0 3px rgba(224,105,159,.22) }
  body.dark.accent-blue{ --primary-l:#15243a } body.dark.accent-violet{ --primary-l:#201b3a } body.dark.accent-rose{ --primary-l:#2e1626 }
  /* badge đồng bộ · nút đổi giao diện · cảnh báo */
  .syncbar{ display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:600;padding:7px 2px 0 }
  .syncbar i{ width:7px;height:7px;border-radius:50%;background:var(--primary);display:inline-block;flex:0 0 auto }
  .theme-tg{ width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:15px;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);color:var(--ink) }
  .theme-tg:active{ transform:scale(.9) }
  .cloud-pill{ display:inline-flex;align-items:center;gap:5px;height:34px;padding:0 12px;border-radius:11px;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);color:var(--ink);font-size:12.5px;font-weight:700;white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis }
  .cloud-pill:active{ transform:scale(.96) }
  @media(max-width:520px){   /* topbar gọn trên điện thoại: pill chỉ còn icon, ẩn phụ đề, thu nhỏ chọn tháng */
    .cloud-pill{ max-width:40px; padding:0 9px; gap:0 }
    .brand small{ display:none }
    .month-nav b{ min-width:74px; font-size:12px }
  }
  .alert{ display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line);font-size:13px }
  .alert:first-child{ border-top:none }
  .alert .ic{ width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:16px;flex:0 0 auto }
  .gauge{ display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px }
  .gauge .g{ background:var(--bg2);border-radius:13px;padding:10px 12px }
  .gauge .g .lab{ font-size:11.5px;color:var(--muted);font-weight:600 }
  .gauge .g .val{ font-size:17px;font-weight:900;margin-top:2px;font-variant-numeric:tabular-nums }

  /* ============================================================
     PHIÊN BẢN WEB — màn hình rộng (≥1000px)
     Bố cục + GIAO DIỆN kiểu trang web/dashboard (không còn dáng app điện thoại):
     nền phẳng, bóng & bo góc nhẹ, hero là panel KPI phẳng, sidebar web, header đặc,
     tab gạch chân, dòng có hover, nút "Thêm giao dịch" có chữ. Dưới 1000px: giữ nguyên app.
     ============================================================ */
  @media (min-width:1000px){
    /* —— Token: làm phẳng bo góc & đổ bóng trên desktop (áp cho cả app) —— */
    :root{ --radius:12px; --radius-sm:10px;
      --shadow:0 1px 3px rgba(16,40,32,.07); --shadow-sm:0 1px 2px rgba(16,40,32,.05);
      --shadow-lg:0 20px 50px rgba(16,40,32,.16) }
    body.dark{ --shadow:0 1px 3px rgba(0,0,0,.5); --shadow-sm:0 1px 2px rgba(0,0,0,.4);
      --shadow-lg:0 20px 50px rgba(0,0,0,.6) }

    /* —— Nền: 2 vầng sáng màu (mint + xanh) cho có chiều sâu, vẫn nhã —— */
    body{ background:
      radial-gradient(1100px 560px at 96% -12%, color-mix(in srgb, var(--primary) 17%, transparent), transparent 55%),
      radial-gradient(900px 520px at -8% 112%, color-mix(in srgb, var(--info) 13%, transparent), transparent 55%),
      var(--bg) }
    body.dark{ background:
      radial-gradient(1100px 560px at 96% -12%, color-mix(in srgb, var(--primary) 28%, transparent), transparent 55%),
      radial-gradient(900px 520px at -8% 112%, color-mix(in srgb, var(--info) 20%, transparent), transparent 55%),
      var(--bg) }

    /* —— Khung tổng: block (bỏ flex-column mobile) + chừa 240px cho sidebar —— */
    .wrap{ display:block; max-width:none; margin:0; padding-left:240px; background:none }
    body.dark .wrap{ background:none }
    .topbar, .screen{ max-width:1280px; margin-left:auto; margin-right:auto }

    /* —— Thanh nav dưới  ->  Sidebar dọc kiểu web (nền đặc, mục active có vạch trái) —— */
    .nav{ position:fixed; top:0; left:0; bottom:0; right:auto; width:240px; height:100vh; z-index:36 }
    .nav-in{ flex-direction:column; align-items:stretch; gap:2px; height:100%; max-width:none;
      padding:16px 12px; border-top:none; border-right:1px solid var(--line); border-radius:0;
      background:var(--card); backdrop-filter:none }
    body.dark .nav-in{ background:var(--card) }
    .nav-in::before{ content:"👛  VíNhà"; display:flex; align-items:center; color:var(--ink);
      font-weight:800; font-size:18px; letter-spacing:.2px; padding:6px 10px 14px; margin-bottom:6px;
      border-bottom:1px solid var(--line) }
    .nav-in button{ flex:0 0 auto; flex-direction:row; justify-content:flex-start; gap:12px; margin:0;
      padding:10px 12px; font-size:13.5px; font-weight:700; color:var(--muted); border-radius:9px }
    .nav-in button .ni{ font-size:18px; filter:none; opacity:.9 }
    .nav-in button:hover{ background:var(--bg2); color:var(--ink) }
    .nav-in button.on{ color:var(--primary-d); background:var(--primary-l); box-shadow:inset 3px 0 0 var(--primary-d) }
    .nav-in button.on .ni{ transform:none; opacity:1 }

    /* —— Header (topbar) kiểu web: nền đặc, viền dưới, đổ bóng nhẹ, dính trên —— */
    .topbar{ padding:12px 28px; background:var(--card); backdrop-filter:none;
      border-bottom:1px solid var(--line); box-shadow:var(--shadow-sm) }
    body.dark .topbar{ background:var(--card) }
    .topbar .brand{ display:none }            /* logo đã ở đầu sidebar */
    .month-nav{ box-shadow:none } .theme-tg{ box-shadow:none }

    /* chip thành viên -> bộ lọc phẳng kiểu web */
    .chips{ padding:10px 0 0; gap:8px }
    .chip{ border-radius:8px; box-shadow:none; padding:7px 13px 7px 8px; font-size:13px }
    .chip.on{ background:var(--primary-l); color:var(--primary-d); border-color:var(--primary); box-shadow:none }
    .chip.on .dot{ background:var(--card)!important }

    .screen{ padding:22px 28px 72px }

    /* —— Hero số dư: SHOWPIECE — gradient + ánh sáng + 2 quầng sáng trôi nhẹ —— */
    .hero{ color:#fff; border:none; border-radius:18px; padding:24px 26px; overflow:hidden; position:relative;
      background:
        linear-gradient(120deg, rgba(255,255,255,.16), rgba(255,255,255,0) 44%),
        linear-gradient(135deg,#15d39a 0%,#0ea372 45%,#0b7d72 100%);
      box-shadow:0 22px 46px rgba(11,107,90,.38) }
    .hero .lab{ color:rgba(255,255,255,.92); font-weight:600; font-size:13px; position:relative; z-index:1 }
    .hero .big{ color:#fff; font-size:40px; font-weight:900; letter-spacing:.4px; position:relative; z-index:1 }
    .hero .sub{ color:rgba(255,255,255,.85); position:relative; z-index:1 }
    .hero .eye{ background:rgba(255,255,255,.2); color:#fff }
    .hero::after{ content:""; display:block; position:absolute; width:250px; height:250px; right:-60px; top:-95px;
      border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,.22), rgba(255,255,255,0) 70%);
      animation:heroFloatA 9s var(--ease) infinite alternate }
    .hero::before{ content:""; display:block; position:absolute; width:190px; height:190px; right:46px; bottom:-95px;
      border-radius:50%; background:radial-gradient(circle, rgba(255,255,255,.15), rgba(255,255,255,0) 70%);
      animation:heroFloatB 11s var(--ease) infinite alternate }
    @keyframes heroFloatA{ to{ transform:translate(-26px,20px) } }
    @keyframes heroFloatB{ to{ transform:translate(20px,-18px) } }

    /* —— Thẻ -> panel web: đầu mục có gạch chân —— */
    .sec-h{ border-bottom:1px solid var(--line); padding-bottom:10px; margin-bottom:12px }
    .sec-h h3{ font-size:14.5px }

    /* —— Dòng giao dịch: gọn, hover kiểu web —— */
    .row{ padding:9px 4px; border-radius:8px }
    .row:hover{ background:var(--card-2) }
    .av{ width:36px; height:36px; border-radius:9px; font-size:17px }
    .row .ti, .amt{ font-size:13.5px }

    /* —— Nút / điều khiển phẳng hơn —— */
    .btn{ border-radius:10px; padding:9px 14px; font-size:13.5px }
    .btn.sm{ border-radius:8px } .addbtn{ box-shadow:none }

    /* —— .seg -> tab gạch chân kiểu web —— */
    .seg{ background:transparent; border-radius:0; padding:0; gap:2px;
      border-bottom:1px solid var(--line); margin-bottom:16px }
    .seg button{ border-radius:0; padding:10px 16px; border-bottom:2px solid transparent; font-size:13.5px }
    .seg.compact button{ font-size:13px; padding:10px 12px }
    .seg button.on{ background:transparent; color:var(--primary-d); border-bottom-color:var(--primary-d); box-shadow:none }

    /* —— Nút + (FAB) -> nút "Thêm giao dịch" có chữ (góc phải-dưới) —— */
    .fab{ position:fixed; left:auto; right:30px; bottom:30px; transform:none;
      width:auto; height:auto; padding:13px 20px; border-radius:11px; gap:0; font-size:0;
      display:inline-flex; align-items:center; justify-content:center; box-shadow:var(--shadow-lg) }
    .fab::after{ content:"＋ Thêm giao dịch"; font-size:14px; font-weight:800; line-height:1; white-space:nowrap }
    .fab:active{ transform:scale(.97) }

    /* —— Hộp thoại (sheet) kiểu web: hiện giữa màn hình —— */
    .sheet-bg{ align-items:center }
    .sheet{ max-width:540px; max-height:88vh; border-radius:14px; border:1px solid var(--line);
      animation:pop .2s cubic-bezier(.2,.8,.2,1) }
    .grab{ display:none }
    @keyframes pop{ from{transform:scale(.97);opacity:.5} to{transform:scale(1);opacity:1} }

    /* ===== TỔNG QUAN sinh động: thẻ có dải màu riêng, ô KPI đậm, hiện dần ===== */
    /* Mỗi mục một tông màu xoay vòng — gán --accent (kế thừa xuống thẻ con) */
    .screen-home > div > *{ --accent:var(--primary) }
    .screen-home > div > *:nth-child(5n+1){ --accent:#0ea05a }
    .screen-home > div > *:nth-child(5n+2){ --accent:#3b82f6 }
    .screen-home > div > *:nth-child(5n+3){ --accent:#f2992b }
    .screen-home > div > *:nth-child(5n+4){ --accent:#7c6cf0 }
    .screen-home > div > *:nth-child(5n+5){ --accent:#e0699f }
    /* dải màu mảnh trên đỉnh mỗi thẻ + gạch chân tiêu đề ăn theo màu đó */
    .screen-home .card{ position:relative }
    .screen-home .card::before{ content:""; position:absolute; left:0; right:0; top:0; height:3px;
      border-radius:var(--radius) var(--radius) 0 0;
      background:linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 12%, transparent)) }
    .screen-home .card .sec-h{ border-bottom-color:color-mix(in srgb, var(--accent) 40%, var(--line)) }

    /* Ô Thu/Chi đậm màu hơn + số to (dùng :has + color-mix nên tự hợp mọi theme) */
    .screen-home .stat{ border-radius:14px }
    .screen-home .stat .v{ font-size:21px }
    .screen-home .stat:has(.v.in){ background:color-mix(in srgb, var(--income) 14%, var(--card));
      border-color:color-mix(in srgb, var(--income) 42%, var(--line)) }
    .screen-home .stat:has(.v.out){ background:color-mix(in srgb, var(--expense) 14%, var(--card));
      border-color:color-mix(in srgb, var(--expense) 42%, var(--line)) }
    .screen-home .stat:has(.v.in) .ic{ background:var(--income)!important; color:#fff }
    .screen-home .stat:has(.v.out) .ic{ background:var(--expense)!important; color:#fff }
    .screen-home .av{ filter:saturate(1.45) }      /* icon tròn rực màu hơn */

    /* Nổi + nhấc nhẹ khi rê chuột */
    .screen-home .card, .screen-home .stat{ transition:transform .18s var(--ease), box-shadow .22s var(--ease) }
    .screen-home .card:hover, .screen-home .stat:hover{ transform:translateY(-4px); box-shadow:0 14px 30px rgba(16,40,32,.16) }
    body.dark .screen-home .card:hover, body.dark .screen-home .stat:hover{ box-shadow:0 14px 30px rgba(0,0,0,.55) }

    /* Hiện dần (so le) khi mở tab — prefers-reduced-motion đã được rule toàn cục xử lý */
    @keyframes vnRise{ from{opacity:0; transform:translateY(18px) scale(.985)} to{opacity:1; transform:none} }
    .screen-home > div > *{ animation:vnRise .55s var(--ease) both }
    .screen-home > div > *:nth-child(1){ animation-delay:.04s }
    .screen-home > div > *:nth-child(2){ animation-delay:.10s }
    .screen-home > div > *:nth-child(3){ animation-delay:.16s }
    .screen-home > div > *:nth-child(4){ animation-delay:.22s }
    .screen-home > div > *:nth-child(5){ animation-delay:.28s }
    .screen-home > div > *:nth-child(6){ animation-delay:.34s }
    .screen-home > div > *:nth-child(7){ animation-delay:.40s }
    .screen-home > div > *:nth-child(n+8){ animation-delay:.46s }

    /* —— Dashboard nhiều cột (Tổng quan & Phân tích) —— */
    .screen-home > div, .screen-analytics > div{ column-count:2; column-gap:16px }
    .screen-home > div > *, .screen-analytics > div > *{ break-inside:avoid }
    .screen-home > div > .hero, .screen-home > div > .card.tight{ column-span:all }

    /* —— Các tab danh sách/biểu mẫu: 1 cột, giới hạn bề rộng cho dễ đọc —— */
    .screen-plan > div, .screen-tx > div, .screen-family > div{ max-width:840px; margin:0 auto }
  }
</style>

  store.set("vn.members",IMPORTED.members); store.set("vn.wallets",IMPORTED.wallets); store.set("vn.cats",IMPORTED.categories);
  store.set("vn.tx",IMPORTED.txs); store.set("vn.budgets",IMPORTED.budgets); store.set("vn.goals",IMPORTED.goals||[]);
  store.set("vn.bills",IMPORTED.bills||[]); store.set("vn.debts",IMPORTED.debts||[]);
  store.set("vn.dataVersion",IMPORTED.version);
}
/* migration một lần: thêm Quỹ du lịch cuối năm nếu chưa có (KHÔNG ghi đè dữ liệu khác) */
if(IMPORTED && !store.get("vn.migr_tripgoal")){
  const _g=store.get("vn.goals",[]); const _tg=(IMPORTED.goals||[]).find(g=>g.id==="g_trip");
  if(_tg && !_g.some(g=>g.id==="g_trip")) store.set("vn.goals",[..._g,_tg]);
  store.set("vn.migr_tripgoal","1");
}
/* migration: tạo ví Tiết kiệm + gắn quỹ du lịch vào ví đó (liên kết thật) */
if(IMPORTED && !store.get("vn.migr_savelink")){
  const _w=store.get("vn.wallets",[]); const _sw=(IMPORTED.wallets||[]).find(w=>w.id==="w_save");
  if(_sw && !_w.some(w=>w.id==="w_save")) store.set("vn.wallets",[..._w,_sw]);
  const _gg=store.get("vn.goals",[]); const _itg=(IMPORTED.goals||[]).find(g=>g.id==="g_trip");
  store.set("vn.goals",_gg.map(g=> g.id==="g_trip"? Object.assign({},g,{link:(_itg&&_itg.link)||"w_save",src:(_itg&&_itg.src)||"w_gd"}):g));
  store.set("vn.migr_savelink","1");
}
/* migration: GỠ ví thu nhập (VCB Digibank, Công Việc) + thành viên Thu nhập nếu trước đó đã thêm */
if(!store.get("vn.migr_income_undo")){
  const rm=new Set(["w_vcb","w_work"]);
  store.set("vn.members",store.get("vn.members",[]).filter(m=>m.id!=="m_inc"));
  store.set("vn.wallets",store.get("vn.wallets",[]).filter(w=>!rm.has(w.id)));
  store.set("vn.tx",store.get("vn.tx",[]).filter(t=>!rm.has(t.walletId)&&!rm.has(t.toWalletId)));
  store.set("vn.cats",store.get("vn.cats",[]).filter(c=>c.owner!=="m_inc"));
  store.set("vn.migr_income_undo","1");
}
/* migration: thêm ví Đầu tư (w_invest, thuộc Gia đình) nếu chưa có */
if(!store.get("vn.migr_invest")){
  const ws=store.get("vn.wallets",[]);
  if(!ws.some(w=>w.id==="w_invest")) store.set("vn.wallets",[...ws,{id:"w_invest",memberId:"m_gd",name:"Đầu tư",type:"invest",icon:"📈",opening:0}]);
  store.set("vn.migr_invest","1");
}
/* nạp dữ liệu ĐỒNG BỘ từ MoneyLover (window.VINHA_SYNC) — chỉ thay phần của 3 ví ML,
   KHÔNG đụng ngân sách / mục tiêu / ví Tiết kiệm / thành viên / chuyển khoản tiết kiệm */
const SYNC = (typeof window!=="undefined" && window.VINHA_SYNC) ? window.VINHA_SYNC : null;
if(SYNC && SYNC.version && store.get("vn.syncVersion")!==SYNC.version){
  const keepTx=store.get("vn.tx",[]).filter(t=> t.type==="transfer" || t.walletId==="w_save" || t.toWalletId==="w_save");
  store.set("vn.tx",[...(SYNC.txs||[]),...keepTx]);
  const baseW=store.get("vn.wallets",[]); const sIds=(SYNC.wallets||[]).map(w=>w.id);
  store.set("vn.wallets",[...(SYNC.wallets||[]),...baseW.filter(w=>!sIds.includes(w.id))]);
  const baseC=store.get("vn.cats",[]); const cIds=new Set(baseC.map(c=>c.id));
  store.set("vn.cats",[...baseC,...(SYNC.categories||[]).filter(c=>!cIds.has(c.id))]);
  if(SYNC.debts){ const baseD=store.get("vn.debts",[]); store.set("vn.debts",[...SYNC.debts,...baseD.filter(d=>d.kind!=="lend")]); }
  store.set("vn.syncVersion",SYNC.version);
}

})();

/* ============ COMPONENT NHỎ ============ */
function MemberDot({m,size}){
  const s=size||34;
  return <span style={{width:s,height:s,borderRadius:"50%",display:"grid",placeItems:"center",
    fontSize:s*0.5,background:(m?m.color:"#7a8794")+"22"}}>{m?m.emoji:"👤"}</span>;
}
function Donut({data,size}){
  const S=size||116, th=15, r=(S-th)/2, C=2*Math.PI*r;
  const total=data.reduce((s,d)=>s+d.value,0);
  let acc=0;
  return (
    <svg width={S} height={S} viewBox={"0 0 "+S+" "+S}>
      <circle cx={S/2} cy={S/2} r={r} fill="none" className="trk" strokeWidth={th}/>
      <g transform={"rotate(-90 "+(S/2)+" "+(S/2)+")"}>
        {total>0 && data.map((d,i)=>{
          const frac=d.value/total, dash=frac*C, off=-acc*C; acc+=frac;
          return <circle key={i} cx={S/2} cy={S/2} r={r} fill="none" stroke={d.color} strokeWidth={th}
            strokeDasharray={dash+" "+(C-dash)} strokeDashoffset={off}/>;
        })}
      </g>
    </svg>
  );
}
function Ring({pct,color,size}){
  const S=size||56, th=6, r=(S-th)/2, C=2*Math.PI*r, p=Math.max(0,Math.min(1,pct));
  return (
    <svg width={S} height={S} viewBox={"0 0 "+S+" "+S}>
      <circle cx={S/2} cy={S/2} r={r} fill="none" className="trk" strokeWidth={th}/>
      <g transform={"rotate(-90 "+(S/2)+" "+(S/2)+")"}>
        <circle cx={S/2} cy={S/2} r={r} fill="none" stroke={color} strokeWidth={th} strokeLinecap="round"
          strokeDasharray={(p*C)+" "+C}/>
      </g>
    </svg>
  );
}

/* ====== Màn đăng nhập / đồng bộ đám mây ====== */
function CloudAuth({user,onClose}){
  const [mode,setMode]=useState("in");
  const [email,setEmail]=useState(user?(user.email||""):"");
  const [pw,setPw]=useState("");
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState("");
  const inp={width:"100%",marginBottom:9,padding:"12px 13px",borderRadius:12,border:"1px solid var(--line-2)",background:"var(--card)",color:"var(--ink)",fontSize:15};
  const submit=async()=>{
    if(!SB){ setMsg("Cần kết nối Internet để đồng bộ."); return; }
    if(!email||!pw){ setMsg("Nhập email và mật khẩu."); return; }
    setBusy(true); setMsg("");
    try{
      const res = mode==="up"
        ? await SB.auth.signUp({email:email.trim(),password:pw})
        : await SB.auth.signInWithPassword({email:email.trim(),password:pw});
      if(res.error) throw res.error;
      if(!res.data.session){ setMsg("Đã tạo tài khoản. Hãy kiểm tra email để xác nhận, rồi đăng nhập lại."); setBusy(false); return; }
      window.__vinhaAuthed=true; setMsg("Đang đồng bộ dữ liệu…");
      let remote=null; try{ remote=await CLOUD.pull(); }catch(e){}
      if(remote && Object.keys(remote).length) CLOUD.apply(remote);
      else { try{ await CLOUD.push(); }catch(e){} }
      location.reload();
    }catch(e){ setMsg("Lỗi: "+(e.message||String(e))); setBusy(false); }
  };
  const logout=async()=>{
    setBusy(true);
    try{ await CLOUD.push(); }catch(e){}
    try{ await SB.auth.signOut(); }catch(e){}
    window.__vinhaAuthed=false;
    try{ Object.keys(localStorage).forEach(k=>{ if(k.indexOf("vn.")===0) localStorage.removeItem(k); }); }catch(e){}
    location.reload();
  };
  return (
    <div className="sheet-bg" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="grab"></div>
        <div className="sheet-h"><h3>☁️ Đồng bộ đám mây</h3>
          <button onClick={onClose} style={{marginLeft:"auto",background:"var(--bg2)",border:"none",width:32,height:32,borderRadius:10,fontSize:15,color:"var(--muted)",cursor:"pointer"}}>✕</button></div>
        {user ? (
          <div>
            <div className="note" style={{marginBottom:12}}>✅ Đang đăng nhập: <b>{user.email}</b><br/>Dữ liệu tự đồng bộ lên đám mây — mở được trên điện thoại / máy khác bằng cùng tài khoản.</div>
            <button className="btn danger block" disabled={busy} onClick={logout}>{busy?"Đang xử lý…":"Đăng xuất & xoá dữ liệu khỏi máy này"}</button>
          </div>
        ) : (
          <div>
            <div className="seg" style={{marginBottom:12}}>
              <button className={mode==="in"?"on":""} onClick={()=>setMode("in")}>Đăng nhập</button>
              <button className={mode==="up"?"on":""} onClick={()=>setMode("up")}>Tạo tài khoản</button>
            </div>
            <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} style={inp} autoComplete="email"/>
            <input type="password" placeholder="Mật khẩu (≥ 6 ký tự)" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter") submit(); }} style={inp} autoComplete={mode==="up"?"new-password":"current-password"}/>
            <button className="btn pri block" disabled={busy} onClick={submit}>{busy?"Đang xử lý…":(mode==="up"?"Tạo tài khoản & đồng bộ":"Đăng nhập & đồng bộ")}</button>
            <div className="note" style={{marginTop:12}}>🔒 Dữ liệu được bảo vệ riêng theo tài khoản (RLS) — chỉ bạn xem được sau khi đăng nhập.</div>
          </div>
        )}
        {msg && <div className="tiny" style={{marginTop:11,color:"var(--muted)",whiteSpace:"normal",lineHeight:1.5}}>{msg}</div>}
      </div>
    </div>
  );
}

const BANK_WORDS=["Vietcombank","VCB","Techcombank","TCB","BIDV","VietinBank","Agribank","MBBank","MB Bank","ACB","VPBank","TPBank","Sacombank","OCB","MSB","SHB","HDBank","VIB","SeABank","Eximbank","Cake","Timo","MoMo","ZaloPay","VNPay","VNeID"];
function cleanNum(x){
  let t=String(x).replace(/[^\d.,]/g,"").replace(/[.,]+$/,"");
  const dec=t.match(/^(\d[\d.,]*)[.,](\d{2})$/); // bỏ phần thập phân ,00 nếu có nhiều nhóm phân tách
  if(dec && /[.,]/.test(dec[1])) t=dec[1];
  return parseInt(t.replace(/[.,]/g,""),10)||0;
}
function parseBankText(raw){
  const s=String(raw||""); const work=s.replace(/[\r\n]+/g," ");
  // Bỏ phần "số dư" để không nhầm số dư thành số tiền giao dịch
  const balCut=work.search(/s[oố]\s*d[ưu]|số\s*dư|so\s*du|\bSDC\b|available|balance/i);
  const head = balCut>0 ? work.slice(0,balCut) : work;
  let dir=null, amount=0;
  let m = head.match(/[(\[]?\s*([+\-])\s*[)\]]?\s*([\d][\d.,]*)\s*(vnd|vnđ|đ|d)\b/i) || head.match(/[(\[]?\s*([+\-])\s*[)\]]?\s*([\d][\d.,]*)/);
  if(m){ dir = m[1]==="-" ? "expense":"income"; amount=cleanNum(m[2]); }
  if(!amount){ const m2=head.match(/([\d][\d.,]{2,})\s*(vnd|vnđ|đ)\b/i); if(m2) amount=cleanNum(m2[1]); }
  if(!dir){
    if(/tr[ừu]\b|chi\b|thanh to[aá]n|r[uú]t|mua\b|payment|debit|ghi n[ợo]/i.test(s)) dir="expense";
    else if(/nh[aậ]n|c[oộ]ng|credit|ti[eề]n v[eề]|ghi c[oó]/i.test(s)) dir="income";
    else dir="expense";
  }
  let note="";
  const mn = s.match(/t[aạ]i\s+([^.;|]+)/i) || s.match(/(?:ND|n[oộ]i\s*dung)\s*[:\-]?\s*([^.;|]+)/i);
  if(mn) note=mn[1].trim().slice(0,50);
  const bank=BANK_WORDS.find(b=> new RegExp("\\b"+b.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i").test(s));
  if(!note) note=work.trim().slice(0,50);
  if(bank && note.toLowerCase().indexOf(bank.toLowerCase())<0) note=bank+" · "+note;
  return {amount, type:dir, note};
}

function PhoneSetup({user,onClose}){
  const [token,setToken]=useState("");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [copied,setCopied]=useState("");
  useEffect(()=>{ let go=true;
    (async()=>{ if(!SB||!user) return;
      try{ const r=await SB.from("vinha_tokens").select("token").order("created_at",{ascending:true}).limit(1).maybeSingle();
        if(go && r.data && r.data.token) setToken(r.data.token);
      }catch(e){}
    })(); return ()=>{go=false;};
  },[]);
  const gen=async()=>{ if(!SB||!user) return; setBusy(true); setErr("");
    const t="vn"+Math.random().toString(36).slice(2)+Math.random().toString(36).slice(2);
    try{ const r=await SB.from("vinha_tokens").insert({token:t,label:"Điện thoại"}); if(r.error) throw r.error; setToken(t); }
    catch(e){ setErr("Lỗi tạo mã: "+(e.message||String(e))); }
    setBusy(false);
  };
  const url=SB_URL+"/rest/v1/vinha_inbox";
  const body='{"token":"'+(token||"<MÃ_CỦA_BẠN>")+'","raw":"{txt}","source":"{app}"}';
  const copy=(txt,tag)=>{ try{ navigator.clipboard.writeText(txt); setCopied(tag); setTimeout(()=>setCopied(""),1200);}catch(e){} };
  const box={background:"var(--bg2)",border:"1px solid var(--line-2)",borderRadius:10,padding:"9px 11px",fontSize:12,wordBreak:"break-all",fontFamily:"monospace",marginBottom:6,lineHeight:1.5};
  const cbtn=t=>({marginBottom:12,fontSize:12,padding:"5px 10px",borderRadius:8,border:"1px solid var(--line-2)",background:copied===t?"var(--pri)":"var(--card)",color:copied===t?"#fff":"var(--ink)",cursor:"pointer"});
  return (
    <Sheet title="📲 Kết nối điện thoại" onClose={onClose}>
      {!user
        ? <div className="note">Hãy đăng nhập đám mây (☁️) trước để tạo mã kết nối riêng cho bạn.</div>
        : <div>
            <div className="note" style={{marginBottom:12}}>Điện thoại (Android + app tự động như <b>MacroDroid</b>/<b>Tasker</b>) bắt thông báo trừ tiền của ngân hàng rồi gửi vào đây. Bạn chỉ việc duyệt ở mục 📥.</div>
            <div className="field"><label>1 · Mã kết nối (bí mật — đừng chia sẻ)</label>
              {token
                ? <div><div style={box}>{token}</div><button style={cbtn("tok")} onClick={()=>copy(token,"tok")}>{copied==="tok"?"✓ Đã chép":"📋 Chép mã"}</button></div>
                : <button className="btn pri block" disabled={busy} onClick={gen}>{busy?"Đang tạo…":"Tạo mã kết nối"}</button>}
            </div>
            {token && <div>
              <div className="field"><label>2 · Trong MacroDroid: Trigger “Notification Received” (chọn app ngân hàng) → Action “HTTP Request (POST)”</label></div>
              <div className="field"><label>URL</label><div style={box}>{url}</div>
                <button style={cbtn("url")} onClick={()=>copy(url,"url")}>{copied==="url"?"✓ Đã chép":"📋 Chép URL"}</button></div>
              <div className="field"><label>Headers (thêm 4 dòng)</label>
                <div style={box}>apikey: {SB_KEY.slice(0,18)}…<br/>Authorization: Bearer {SB_KEY.slice(0,12)}…<br/>Content-Type: application/json<br/>Prefer: return=minimal</div>
                <button style={cbtn("hd")} onClick={()=>copy("apikey: "+SB_KEY+"\nAuthorization: Bearer "+SB_KEY+"\nContent-Type: application/json\nPrefer: return=minimal","hd")}>{copied==="hd"?"✓ Đã chép":"📋 Chép Headers"}</button></div>
              <div className="field"><label>Body (JSON) — thay {"{txt}"} bằng biến “nội dung thông báo”, {"{app}"} bằng tên app</label>
                <div style={box}>{body}</div>
                <button style={cbtn("bd")} onClick={()=>copy(body,"bd")}>{copied==="bd"?"✓ Đã chép":"📋 Chép Body"}</button></div>
              <div className="note">Trên iPhone không đọc được thông báo app khác — chỉ lách được qua Shortcuts đọc <b>SMS</b> ngân hàng.</div>
            </div>}
            {err && <div className="tiny" style={{color:"var(--danger)",marginTop:8}}>{err}</div>}
          </div>}
    </Sheet>
  );
}

function InboxRow({it,db,reload}){
  const {members,wallets,cats,addTx,memberOfWallet}=db;
  const guess=useMemo(()=>parseBankText(it.raw),[it.id]);
  const [type,setType]=useState(guess.type);
  const [amount,setAmount]=useState(guess.amount);
  const [walletId,setWalletId]=useState((wallets[0]||{}).id);
  const [categoryId,setCategoryId]=useState(guess.type==="income"?"i_other":"c_other");
  const [note,setNote]=useState(guess.note);
  const [busy,setBusy]=useState(false);
  const owner=(memberOfWallet(walletId)||{}).id;
  const done=async()=>{ try{ if(SB) await SB.from("vinha_inbox").delete().eq("id",it.id); }catch(e){} reload(); };
  const add=async()=>{ if(!amount||amount<=0){ alert("Số tiền không hợp lệ — sửa lại giúp mình"); return; } if(!walletId){ alert("Chọn ví"); return; }
    setBusy(true); addTx({type,amount,date:today(),walletId,categoryId,note}); await done(); };
  const skip=async()=>{ setBusy(true); await done(); };
  return (
    <div className="card" style={{marginBottom:12}}>
      <div className="tiny muted" style={{whiteSpace:"normal",lineHeight:1.5,marginBottom:9}}>{it.source?("📱 "+it.source+" · "):""}{it.raw}</div>
      <div className="typeseg" style={{marginBottom:9}}>
        {[["expense","Chi tiền","out"],["income","Thu tiền","in"]].map(([k,l,cl])=>
          <button key={k} className={type===k?("on "+cl):""} onClick={()=>{setType(k); setCategoryId(k==="income"?"i_other":"c_other");}}>{l}</button>)}
      </div>
      <MoneyInput value={amount} onChange={setAmount} kind={type==="income"?"in":"out"}/>
      <div style={{height:9}}></div>
      <WalletSelect members={members} wallets={wallets} value={walletId} onChange={setWalletId} label={type==="income"?"Vào ví":"Từ ví"}/>
      <div className="field"><label>Danh mục</label>
        <CatPicker cats={cats} type={type} value={categoryId} onChange={setCategoryId} owner={owner}/></div>
      <div className="field"><label>Ghi chú</label>
        <input className="input" value={note} onChange={e=>setNote(e.target.value)} placeholder="Ghi chú"/></div>
      <div className="two">
        <button className="btn" disabled={busy} onClick={skip}>Bỏ qua</button>
        <button className="btn pri" disabled={busy} onClick={add}>➕ Thêm vào sổ</button>
      </div>
    </div>
  );
}

function PhoneInbox({db,items,reload,onOpenSetup,onClose}){
  return (
    <Sheet title={"📥 Từ ngân hàng"+(items.length?(" ("+items.length+")"):"")} onClose={onClose}>
      <button className="btn block" style={{marginBottom:12}} onClick={onOpenSetup}>📲 Cài đặt kết nối điện thoại</button>
      {items.length===0
        ? <div className="note">Chưa có giao dịch mới. Khi điện thoại đẩy thông báo trừ/cộng tiền lên, nó sẽ hiện ở đây để bạn duyệt vào sổ.</div>
        : items.map(it=> <InboxRow key={it.id} it={it} db={db} reload={reload}/>)}
    </Sheet>
  );
}

function App(){
  const IMP = (typeof window!=="undefined" && window.VINHA_DATA) ? window.VINHA_DATA : null;
  const [members,setMembers]=useState(()=>store.get("vn.members",IMP?IMP.members:SEED_MEMBERS));
  const [wallets,setWallets]=useState(()=>store.get("vn.wallets",IMP?IMP.wallets:SEED_WALLETS));
  const [cats]=useState(()=>store.get("vn.cats",IMP?IMP.categories:CATEGORIES));
  const [txs,setTxs]=useState(()=>store.get("vn.tx",IMP?IMP.txs:SEED_TX));
  const [budgets,setBudgets]=useState(()=>store.get("vn.budgets",IMP?IMP.budgets:SEED_BUDGETS));
  const [goals,setGoals]=useState(()=>store.get("vn.goals",IMP?IMP.goals:SEED_GOALS));
  const [bills,setBills]=useState(()=>store.get("vn.bills",IMP?IMP.bills:SEED_BILLS));
  const [debts,setDebts]=useState(()=>store.get("vn.debts",IMP?IMP.debts:SEED_DEBTS));

  useEffect(()=>store.set("vn.members",members),[members]);
  useEffect(()=>store.set("vn.wallets",wallets),[wallets]);
  useEffect(()=>store.set("vn.tx",txs),[txs]);
  useEffect(()=>store.set("vn.budgets",budgets),[budgets]);
  useEffect(()=>store.set("vn.goals",goals),[goals]);
  useEffect(()=>store.set("vn.bills",bills),[bills]);
  useEffect(()=>store.set("vn.debts",debts),[debts]);

  /* trạng thái đăng nhập đám mây */
  const [sbUser,setSbUser]=useState(null);
  const [authOpen,setAuthOpen]=useState(false);
  const [inbox,setInbox]=useState([]);
  const [inboxOpen,setInboxOpen]=useState(false);
  const [setupOpen,setSetupOpen]=useState(false);
  useEffect(()=>{ if(!SB) return;
    SB.auth.getUser().then(({data})=>setSbUser((data&&data.user)||null)).catch(()=>{});
    const {data:sub}=SB.auth.onAuthStateChange((_e,sess)=>{ const u=sess?sess.user:null; setSbUser(u); window.__vinhaAuthed=!!u; });
    return ()=>{ try{ sub.subscription.unsubscribe(); }catch(e){} };
  },[]);
  // Định kỳ kéo hộp thư giao dịch ngân hàng do điện thoại đẩy lên
  useEffect(()=>{ if(!SB||!sbUser){ setInbox([]); return; }
    let alive=true;
    const pull=async()=>{ try{ const r=await SB.from("vinha_inbox").select("*").eq("status","pending").order("created_at",{ascending:true}); if(alive&&!r.error) setInbox(r.data||[]); }catch(e){} };
    pull(); const iv=setInterval(pull,25000);
    const onVis=()=>{ if(document.visibilityState==="visible") pull(); };
    document.addEventListener("visibilitychange",onVis); window.__vinhaPullInbox=pull;
    return ()=>{ alive=false; clearInterval(iv); document.removeEventListener("visibilitychange",onVis); };
  },[sbUser]);

  const [tab,setTab]=useState("home");
  const [ym,setYm]=useState(curYM());
  const [focus,setFocus]=useState(()=>{ const gd=members.find(m=>m.id==="m_gd"); return gd?gd.id:((members[0]||{}).id||"m_gd"); }); // memberId — mỗi ví riêng
  const [txEdit,setTxEdit]=useState(null); // null | {} | tx
  const [txSeg,setTxSeg]=useState("tx"); // tx | bill | debt — phân đoạn trong tab Giao dịch
  const [theme,setTheme]=useState(()=>store.get("vn.theme",{dark:false,accent:"emerald"}));
  useEffect(()=>{ store.set("vn.theme",theme); applyTheme(theme); },[theme]);
  const syncTs=(()=>{ const v=store.get("vn.syncVersion",""); const m=/sync-(\d+)/.exec(String(v)); return m?Number(m[1]):null; })();

  // helpers — memo hoá bản đồ tra cứu & số dư (tránh .find()/quét tx lặp lại mỗi render)
  const mById=useMemo(()=>{const m={};members.forEach(x=>m[x.id]=x);return m;},[members]);
  const wById=useMemo(()=>{const m={};wallets.forEach(x=>m[x.id]=x);return m;},[wallets]);
  const cById=useMemo(()=>{const m={};cats.forEach(x=>m[x.id]=x);return m;},[cats]);
  const memberById=id=>mById[id];
  const walletById=id=>wById[id];
  const catById=id=>cById[id];
  const memberOfWallet=wid=>{ const w=wById[wid]; return w?mById[w.memberId]:null; };

  const balMap=useMemo(()=>{
    const m={}; wallets.forEach(w=>m[w.id]=w.opening||0);
    txs.forEach(t=>{
      if(t.type==="income"){ if(m[t.walletId]!=null) m[t.walletId]+=t.amount; }
      else if(t.type==="expense"){ if(m[t.walletId]!=null) m[t.walletId]-=t.amount; }
      else if(t.type==="transfer"){ if(m[t.walletId]!=null)m[t.walletId]-=t.amount; if(m[t.toWalletId]!=null)m[t.toWalletId]+=t.amount; }
    });
    return m;
  },[wallets,txs]);
  const balanceOf=wid=> balMap[wid]||0;
  const memberBalance=mid=> wallets.filter(w=>w.memberId===mid).reduce((s,w)=>s+balanceOf(w.id),0);
  const familyTotal=()=> wallets.reduce((s,w)=>s+balanceOf(w.id),0);
  const inFocus=(t,f)=>{ if(!f||f==="all") return true; const w=wById[t.walletId], w2=t.toWalletId?wById[t.toWalletId]:null; return !!((w&&w.memberId===f)||(w2&&w2.memberId===f)); };
  const budgetSpent=(b,m)=> txs.filter(t=>t.type==="expense"&&ymOf(t.date)===m&&t.categoryId===b.categoryId&&(b.scope==="family"||(memberOfWallet(t.walletId)||{}).id===b.scope)).reduce((s,t)=>s+t.amount,0);

  // actions
  const addTx=t=> setTxs(p=>[Object.assign({id:uid()},t),...p]);
  const saveTx=t=> setTxs(p=> p.some(x=>x.id===t.id)? p.map(x=>x.id===t.id?t:x) : [t,...p]);
  const delTx=id=> setTxs(p=>p.filter(x=>x.id!==id));

  // #8 — tự ghi khoản định kỳ (lương / chi cố định) khi tới ngày trong tháng (1 lần/tháng/khoản)
  useEffect(()=>{ const rules=store.get("vn.recurring",[]); if(!rules.length) return;
    const dd=new Date().getDate(), cm=curYM(); let changed=false;
    const next=rules.map(r=>{ if(dd>=r.day && r.last!==cm && r.amount>0){
        addTx({type:r.type,amount:r.amount,date:today(),walletId:r.walletId,categoryId:r.categoryId,note:r.note||(r.type==="income"?"Lương/Thu định kỳ":"Chi cố định")});
        changed=true; return Object.assign({},r,{last:cm}); } return r; });
    if(changed) store.set("vn.recurring",next);
  },[]);

  const db={members,setMembers,wallets,setWallets,cats,txs,budgets,setBudgets,goals,setGoals,bills,setBills,debts,setDebts,
    ym,setYm,focus,setFocus,memberById,walletById,catById,memberOfWallet,balanceOf,memberBalance,familyTotal,inFocus,budgetSpent,
    addTx,saveTx,delTx,openTx:setTxEdit,setTab,theme,setTheme,txSeg,setTxSeg};

  return (
    <div className="wrap">
      <div className="topbar">
        <div className="toprow">
          <div className="brand"><span className="logo">👛</span><div>VíNhà<small>Tài chính gia đình</small></div></div>
          {SB && <button className="cloud-pill" style={{marginLeft:"auto"}} onClick={()=>setAuthOpen(true)} title="Đồng bộ đám mây">{sbUser?("☁️ "+(((sbUser.email||"").split("@")[0])||"Tài khoản")):"☁️ Đăng nhập"}</button>}
          {SB && sbUser && <button className="cloud-pill" style={{marginLeft:8,position:"relative"}} onClick={()=>setInboxOpen(true)} title="Giao dịch từ ngân hàng">📥{inbox.length?(" "+inbox.length):""}</button>}
          <button className="theme-tg" aria-label="Sáng/Tối" style={{marginLeft:SB?8:"auto"}} onClick={()=>setTheme(t=>({...t,dark:!t.dark}))}>{theme.dark?"☀️":"🌙"}</button>
          <div className="month-nav" style={{marginLeft:8}}>
            <button className="mbtn" aria-label="Tháng trước" onClick={()=>setYm(addMonths(ym,-1))}>‹</button>
            <b>{ymLabel(ym)}</b>
            <button className="mbtn" aria-label="Tháng sau" onClick={()=>setYm(addMonths(ym,1))}>›</button>
          </div>
        </div>
        {syncTs && <div className="syncbar"><i></i>Đồng bộ MoneyLover · {fmtTs(syncTs)}</div>}
        {(tab==="home"||(tab==="tx"&&txSeg==="tx")||tab==="analytics") &&
          <div className="chips">
            {members.map(m=>
              <button key={m.id} className={"chip"+(focus===m.id?" on":"")} onClick={()=>setFocus(m.id)}>
                <span className="dot" style={{background:m.color+"22"}}>{m.emoji}</span>{m.name}</button>)}
          </div>}
      </div>

      <main className={"screen screen-"+tab}>
        {tab==="home" && <Home db={db}/>}
        {tab==="analytics" && <Analytics db={db}/>}
        {tab==="tx" && <TxTab db={db}/>}
        {tab==="plan" && <Plan db={db}/>}
        {tab==="family" && <Family db={db}/>}
      </main>

      {(tab==="home"||(tab==="tx"&&txSeg==="tx")) &&
        <button className="fab" aria-label="Thêm giao dịch" onClick={()=>setTxEdit({})}>+</button>}

      <nav className="nav"><div className="nav-in">
        {[["home","🏠","Tổng quan"],["analytics","📊","Phân tích"],["tx","🧾","Giao dịch"],["plan","🎯","Kế hoạch"],["family","👪","Gia đình"]].map(([k,ic,lb])=>
          <button key={k} className={tab===k?"on":""} onClick={()=>setTab(k)}>
            <span className="ni">{ic}</span>{lb}</button>)}
      </div></nav>

      {txEdit!==null &&
        <TxSheet db={db} init={txEdit} onClose={()=>setTxEdit(null)}/>}
      {authOpen && <CloudAuth user={sbUser} onClose={()=>setAuthOpen(false)}/>}
      {inboxOpen && <PhoneInbox db={db} items={inbox} reload={()=>window.__vinhaPullInbox&&window.__vinhaPullInbox()} onOpenSetup={()=>{setInboxOpen(false);setSetupOpen(true);}} onClose={()=>setInboxOpen(false)}/>}
      {setupOpen && <PhoneSetup user={sbUser} onClose={()=>setSetupOpen(false)}/>}
    </div>
  );
}

const SECT_TITLE={networth:"Tài sản ròng",reminders:"Nhắc nhở",io:"Thu / Chi tháng",incomegoal:"Mục tiêu thu nhập",tripgoal:"Quỹ mục tiêu",members:"Số dư thành viên",bills:"Hóa đơn sắp tới",recent:"Giao dịch gần đây"};
function SectionBox({id,title,layout,setLayout,edit,first,last,onMove,children}){
  const L=layout||{}, hidden=!!(L.hidden&&L.hidden[id]), collapsed=!!(L.collapsed&&L.collapsed[id]);
  if(hidden && !edit) return null;
  const tog=f=>setLayout(p=>{ const n=Object.assign({},p); n[f]=Object.assign({},p[f]||{}); n[f][id]=!(p[f]&&p[f][id]); return n; });
  return (
    <div className={"sbox"+(hidden?" hid":"")}>
      {edit &&
        <div className="sbar">
          <span className="st">⋮ {title}{hidden?" · đang ẩn":collapsed?" · thu gọn":""}</span>
          <button disabled={first} onClick={()=>onMove(id,-1)} aria-label="Lên">↑</button>
          <button disabled={last} onClick={()=>onMove(id,1)} aria-label="Xuống">↓</button>
          <button onClick={()=>tog("collapsed")} aria-label="Thu gọn">{collapsed?"▢":"▤"}</button>
          <button className={hidden?"on":""} onClick={()=>tog("hidden")} aria-label="Ẩn/Hiện">{hidden?"🙈":"👁"}</button>
        </div>}
      {(collapsed && !edit)
        ? <div className="card scol" onClick={()=>tog("collapsed")}><span style={{fontWeight:700,fontSize:13}}>{title}</span><span style={{marginLeft:"auto",color:"var(--muted)",fontSize:12}}>▸ mở</span></div>
        : children}
    </div>
  );
}
function SectionList({tab,items,layout,setLayout,edit}){
  const L=layout||{};
  const vis=items.filter(it=>it.when!==false && it.node);
  const saved=(L.order&&L.order[tab])||[];
  const sorted=vis.slice().sort((a,b)=>{ const ia=saved.indexOf(a.id),ib=saved.indexOf(b.id); return (ia<0?vis.indexOf(a)+100:ia)-(ib<0?vis.indexOf(b)+100:ib); });
  const ids=sorted.map(s=>s.id);
  const move=(id,dir)=>{ const i=ids.indexOf(id),j=i+dir; if(j<0||j>=ids.length) return; const arr=ids.slice(); const t=arr[i];arr[i]=arr[j];arr[j]=t; setLayout(p=>Object.assign({},p,{order:Object.assign({},p.order||{},{[tab]:arr})})); };
  return sorted.map((it,i)=><SectionBox key={it.id} id={it.id} title={SECT_TITLE[it.id]||it.id} layout={layout} setLayout={setLayout} edit={edit} first={i===0} last={i===sorted.length-1} onMove={move}>{it.node}</SectionBox>);
}

              : <Empty e="📭" title="Chưa có giao dịch" sub="Nhấn nút + để thêm khoản thu/chi."/>}

      ]}/>

        onSave={amt=> setGoals(p=>p.map(x=>x.id===goalTopup.id?Object.assign({},x,{saved:Math.max(0,(x.saved||0)+amt)}):x))}/>}

  );
}

function nextSaleEvents(){
  const today=new Date(); today.setHours(0,0,0,0); const Y=today.getFullYear(), evs=[];
  for(let m=1;m<=12;m++){ let d=new Date(Y,m-1,m); if(d<today) d=new Date(Y+1,m-1,m); evs.push({d,label:m+"."+m,mega:m>=9}); }
  return evs.map(e=>({label:e.label,mega:e.mega,days:Math.round((e.d-today)/86400000)})).sort((a,b)=>a.days-b.days).slice(0,4);
}

    </div>

}
function Analytics({db}){
  const {ym,focus,txs,budgets,catById}=db;
  const inFocus=t=>db.inFocus(t,focus);
  const monthTx=txs.filter(t=>ymOf(t.date)===ym && inFocus(t));
  const expense=monthTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);

  const byCat={};
  monthTx.filter(t=>t.type==="expense").forEach(t=>{ byCat[t.categoryId]=(byCat[t.categoryId]||0)+t.amount; });
  let donutData=Object.keys(byCat).map(cid=>{ const c=catById(cid)||{}; return {label:c.name||"Khác",value:byCat[cid],color:c.color||"#7a8794"}; }).sort((a,b)=>b.value-a.value);
  let legend=donutData.slice(0,5);
  if(donutData.length>5){ const rest=donutData.slice(5).reduce((s,d)=>s+d.value,0); legend=legend.concat([{label:"Khác",value:rest,color:"#c2cdc8"}]); }

  const months=last6();
  const trend=months.map(m=>{ const ts=txs.filter(t=>ymOf(t.date)===m && inFocus(t));
    return {ym:m, in:ts.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0), out:ts.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0)}; });
  const trendMax=Math.max(1,...trend.flatMap(m=>[m.in,m.out]));

  const budgetStat=budgets.map(b=>({b,spent:db.budgetSpent(b,ym)})).map(x=>({...x,pct:x.spent/x.b.amount})).sort((a,b)=>b.pct-a.pct).slice(0,3);

  // #4 bất thường: danh mục tháng này so trung bình 3 tháng trước
  const prevMonths=[addMonths(ym,-1),addMonths(ym,-2),addMonths(ym,-3)];
  const prevByCat={};
  prevMonths.forEach(pm=>{ txs.filter(t=>t.type==="expense"&&ymOf(t.date)===pm&&inFocus(t)).forEach(t=>{ prevByCat[t.categoryId]=(prevByCat[t.categoryId]||0)+t.amount; }); });
  const anomalies=Object.keys(byCat).map(cid=>{ const cur=byCat[cid], avg=(prevByCat[cid]||0)/3, c=catById(cid)||{}; const ratio=avg>0?cur/avg:(cur>300000?9:0); return {cid,c,cur,avg,ratio}; })
    .filter(a=> a.cur>=200000 && a.ratio>=1.8).sort((a,b)=>b.ratio-a.ratio).slice(0,4);

  // 💡 cơ hội tiết kiệm — khoản "có thể cắt giảm" (trừ thiết yếu), TB 3 tháng gần nhất
  const [cutPct,setCutPct]=useState(0.2);
  const FIXED=/(điện|nước|thuê|trọ|nhà ở|internet|wifi|học phí|học|giáo dục|trường|thuốc|khám|bệnh|y tế|sức khỏe|bảo hiểm|sữa|bỉm|tã|vay|trả nợ|hoá đơn|hóa đơn)/i;
  const cut3=[ym,addMonths(ym,-1),addMonths(ym,-2)], cutBy={};
  cut3.forEach(m=>{ txs.filter(t=>t.type==="expense"&&ymOf(t.date)===m&&inFocus(t)).forEach(t=>{ cutBy[t.categoryId]=(cutBy[t.categoryId]||0)+t.amount; }); });
  const cuttable=Object.keys(cutBy).map(cid=>{ const c=catById(cid)||{}; return {cid,c,avg:Math.round(cutBy[cid]/3)}; })
    .filter(x=> x.c.name && !FIXED.test(x.c.name) && x.avg>=100000).sort((a,b)=>b.avg-a.avg).slice(0,5);
  const totalCut=cuttable.reduce((s,x)=>s+Math.round(x.avg*cutPct),0);

  // 🎯 kỷ luật chi + 🔥 chuỗi giữ ngân sách (chuyển từ Tổng quan)
  const isCurM=ym===curYM();
  const bTotal=budgets.reduce((s,b)=>s+b.amount,0);
  const bSpent=budgets.reduce((s,b)=>s+db.budgetSpent(b,ym),0);
  const _d=new Date(), _dd=_d.getDate(), _dim=new Date(_d.getFullYear(),_d.getMonth()+1,0).getDate();
  const dAllow=bTotal>0?Math.max(0,Math.round((bTotal-bSpent)/Math.max(1,_dim-_dd+1))):0;
  const pEnd=_dd>0?Math.round(bSpent/_dd*_dim):bSpent;
  const bStreak=(()=>{ if(bTotal<=0) return 0; let n=0,mm=addMonths(curYM(),-1);
    for(let i=0;i<24;i++){ const sp=budgets.reduce((s,b)=>s+db.budgetSpent(b,mm),0); if(sp<=0||sp>bTotal) break; n++; mm=addMonths(mm,-1); } return n; })();

  return (
    <div>
      {isCurM && bTotal>0 &&
        <div className="card">
          <div className="sec-h"><h3>🎯 Kỷ luật chi tháng này</h3>
            <span className="more" onClick={()=>db.setTab("plan")}>Ngân sách</span></div>
          <div className="gauge">
            <div className="g"><div className="lab">Hôm nay còn được tiêu</div>
              <div className="val" style={{color:dAllow>0?"var(--income)":"var(--expense)"}}>{fmtVND(dAllow)}</div></div>
            <div className="g"><div className="lab">Dự báo cuối tháng</div>
              <div className="val" style={{color:pEnd>bTotal?"var(--expense)":"var(--ink)"}}>{fmtK(pEnd)}</div></div>
          </div>
          <div className={"bar"+(bSpent>bTotal?" over":bSpent>bTotal*0.85?" warn":"")} style={{marginTop:10}}>
            <i style={{width:Math.min(100,bSpent/bTotal*100)+"%"}}></i></div>
          <div className="tiny muted" style={{marginTop:6}}>Đã chi {fmtVND(bSpent)} / {fmtVND(bTotal)} ·
            {pEnd>bTotal? <span style={{color:"var(--expense)"}}> dự kiến vượt {fmtK(pEnd-bTotal)}</span>
              : <span style={{color:"var(--income)"}}> dự kiến dư {fmtK(bTotal-pEnd)}</span>}</div>
        </div>}
      {bStreak>0 &&
        <div className="card tight" style={{display:"flex",alignItems:"center",gap:11,borderColor:"var(--income)"}}>
          <span style={{fontSize:24,lineHeight:1}}>🔥</span>
          <div style={{flex:1,minWidth:0}}>
            <b style={{fontSize:14}}>{bStreak} tháng liên tiếp giữ trong ngân sách</b>
            <div className="tiny muted">Giữ vững nhịp này — mỗi tháng đạt là một bước gần mục tiêu hơn!</div>
          </div>
        </div>}
      {cuttable.length>0 &&
        <div className="card">
          <div className="sec-h"><h3>💡 Cơ hội tiết kiệm</h3>
            <span className="tiny muted" style={{marginLeft:"auto"}}>nếu giảm</span></div>
          <div className="seg" style={{margin:"2px 0 12px"}}>
            {[0.1,0.2,0.3].map(p=><button key={p} className={cutPct===p?"on":""} onClick={()=>setCutPct(p)}>{Math.round(p*100)}%</button>)}
          </div>
          {cuttable.map(x=>{ const save=Math.round(x.avg*cutPct);
            return (
              <div className="row" key={x.cid}>
                <span className="av" style={{background:(x.c.color||"#999")+"22"}}>{catIcon(x.c.icon||"💸")}</span>
                <div className="grow"><div className="ti">{x.c.name}</div>
                  <div className="desc">TB {fmtK(x.avg)}/tháng</div></div>
                <div style={{textAlign:"right"}}>
                  <div className="amt in">+{fmtK(save)}</div>
                  <span className="tiny muted">/tháng</span></div>
              </div>);
          })}
          <div className="kv" style={{marginTop:4}}>
            <b>Giảm {Math.round(cutPct*100)}% các khoản này</b>
            <b style={{color:"var(--income)"}}>+{fmtVND(totalCut)}/th</b></div>
          <div className="tiny" style={{marginTop:5,textAlign:"center",color:"var(--income)",fontWeight:700}}>≈ để dành thêm {fmtVND(totalCut*12)} mỗi năm 💪</div>
        </div>}
      {anomalies.length>0 &&
        <div className="card">
          <div className="sec-h"><h3>⚠️ Bất thường tháng này</h3></div>
          {anomalies.map(a=>
            <div className="row" key={a.cid}>
              <span className="av" style={{background:(a.c.color||"#999")+"22"}}>{catIcon(a.c.icon||"📦")}</span>
              <div className="grow"><div className="ti">{a.c.name}</div>
                <div className="desc">{a.avg>0? "TB 3 tháng: "+fmtK(a.avg):"khoản mới tháng này"}</div></div>
              <div style={{textAlign:"right"}}>
                <div className="amt out">{fmtVND(a.cur)}</div>
                {a.avg>0 && <span className="pill r">cao ×{a.ratio.toFixed(1)}</span>}</div>
            </div>)}
        </div>}
      <div className="card">
        <div className="sec-h"><h3>📊 Chi tiêu theo danh mục</h3><span className="more">{ymLabel(ym)}</span></div>
        {expense>0 ?
          <div className="donut-wrap">
            <div className="donut">
              <Donut data={donutData}/>
              <div className="ctr"><div><b>{fmtK(expense)}</b><small>tổng chi</small></div></div>
            </div>
            <div className="legend">
              {legend.map((l,i)=>
                <div className="lg" key={i}><span className="sw" style={{background:l.color}}></span>{l.label}
                  <b>{Math.round(l.value/expense*100)}%</b></div>)}
            </div>
          </div>
          : <Empty e="🧾" title="Chưa có chi tiêu" sub={"Tháng "+ymLabel(ym)+" chưa ghi khoản chi nào."}/>}
      </div>

      <div className="card">
        <div className="sec-h"><h3>📈 Thu / Chi 6 tháng</h3>
          <span className="tiny muted" style={{marginLeft:"auto"}}>
            <span style={{color:"var(--income)"}}>● Thu</span> &nbsp;<span style={{color:"var(--expense)"}}>● Chi</span></span></div>
        <div className="trend">
          {trend.map((m,i)=>
            <div className={"col"+(m.ym===ym?" cur":"")} key={i}>
              <div className="pair">
                <div className="b in" style={{height:Math.max(2,m.in/trendMax*100)+"%"}} title={fmtVND(m.in)}></div>
                <div className="b out" style={{height:Math.max(2,m.out/trendMax*100)+"%"}} title={fmtVND(m.out)}></div>

          {budgetStat.map(({b,spent,pct})=>{
            const c=catById(b.categoryId)||{}, over=pct>1, warn=pct>0.8;

                      {Math.round(pct*100)}%</span></div>

function Transactions({db}){
  const {txs,ym,focus,cats,walletById,openTx}=db;
  const [type,setType]=useState("all");
  const [q,setQ]=useState("");
  const [cat,setCat]=useState("");
  const [amin,setAmin]=useState(0);
  const [amax,setAmax]=useState(0);
  const [showFilter,setShowFilter]=useState(false);

  const inFocus=t=>db.inFocus(t,focus);
  let list=txs.filter(t=>ymOf(t.date)===ym && inFocus(t));
  if(type!=="all") list=list.filter(t=>t.type===type);
  if(cat) list=list.filter(t=>t.categoryId===cat);
  if(amin) list=list.filter(t=>t.amount>=amin);
  if(amax) list=list.filter(t=>t.amount<=amax);
  if(q.trim()){ const s=q.toLowerCase(); list=list.filter(t=>(t.note||"").toLowerCase().includes(s)); }
  list=list.slice().sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:0);

  const groups={};
  list.forEach(t=>{ (groups[t.date]=groups[t.date]||[]).push(t); });
  const days=Object.keys(groups).sort((a,b)=>a<b?1:-1);

  const income=list.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const expense=list.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);

  return (
    <div>
      <div className="stat2">
        <div className="stat"><div className="t">Thu</div><div className="v in">{fmtVND(income)}</div></div>
        <div className="stat"><div className="t">Chi</div><div className="v out">{fmtVND(expense)}</div></div>
      </div>
      <div className="seg">
        {[["all","Tất cả"],["expense","Chi"],["income","Thu"],["transfer","Chuyển"]].map(([k,l])=>
          <button key={k} className={type===k?"on":""} onClick={()=>setType(k)}>{l}</button>)}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:13}}>
        <input className="input" placeholder="🔍 Tìm theo ghi chú…" value={q} onChange={e=>setQ(e.target.value)} style={{flex:1}}/>
        <button className={"btn sm "+((showFilter||cat||amin||amax)?"pri":"ghost")} style={{flex:"0 0 auto"}} onClick={()=>setShowFilter(s=>!s)}>⚙ Lọc</button>
      </div>
      {showFilter &&
        <div className="card tight" style={{marginBottom:13}}>
          <div className="field" style={{marginBottom:10}}><label>Danh mục</label>
            <select className="select" value={cat} onChange={e=>setCat(e.target.value)}>
              <option value="">Tất cả danh mục</option>
              {cats.map(c=><option key={c.id} value={c.id}>{((c.icon&&c.icon[0]==="@")?"🎱":(c.icon||""))+" "+c.name}</option>)}
            </select></div>

            <div className="field" style={{marginBottom:0}}><label>Số tiền từ</label>
              <input className="input" inputMode="numeric" placeholder="0" value={amin?amin.toLocaleString("vi-VN"):""} onChange={e=>setAmin(parseInt(e.target.value.replace(/\D/g,""),10)||0)}/></div>
            <div className="field" style={{marginBottom:0}}><label>Đến</label>
              <input className="input" inputMode="numeric" placeholder="∞" value={amax?amax.toLocaleString("vi-VN"):""} onChange={e=>setAmax(parseInt(e.target.value.replace(/\D/g,""),10)||0)}/></div>
          </div>
          {(cat||amin||amax)? <button className="btn ghost sm block" style={{marginTop:11}} onClick={()=>{setCat("");setAmin(0);setAmax(0);}}>✕ Xóa lọc</button>:null}
        </div>}

      {days.length? days.map(d=>{
        const dayTx=groups[d];
        const net=dayTx.reduce((s,t)=>s+(t.type==="income"?t.amount:t.type==="expense"?-t.amount:0),0);
        return (
          <div key={d}>

    </div>
  );
}

/* form thêm/sửa giao dịch */
function TxSheet({db,init,onClose}){
  const {members,wallets,cats,saveTx,delTx,memberOfWallet}=db;
  const editing=init&&init.id;
  const [type,setType]=useState(init.type||"expense");
  const [amount,setAmount]=useState(init.amount||0);
  const [categoryId,setCategoryId]=useState(init.categoryId|| (type==="income"?"i_salary":"c_food"));
  const [walletId,setWalletId]=useState(init.walletId|| (wallets[0]&&wallets[0].id));
  const [toWalletId,setToWalletId]=useState(init.toWalletId||"");
  const [date,setDate]=useState(init.date||today());
  const [note,setNote]=useState(init.note||"");

  // lọc danh mục theo chủ ví đang chọn (mỗi ví có bộ danh mục riêng)
  const owner=(memberOfWallet(walletId)||{}).id;
  useEffect(()=>{
    if(type==="transfer") return;
    const ok=cats.some(c=>c.id===categoryId && c.type===type && (!owner||!c.owner||c.owner===owner));
    if(!ok){ const first=cats.find(c=>c.type===type && (!owner||!c.owner||c.owner===owner)); setCategoryId(first?first.id:""); }
  },[walletId,type]);

  const setT=nt=>{ setType(nt);
    if(nt==="income"&&!cats.some(c=>c.id===categoryId&&c.type==="income")) setCategoryId("i_salary");
    if(nt==="expense"&&!cats.some(c=>c.id===categoryId&&c.type==="expense")) setCategoryId("c_food"); };

  const save=()=>{
    if(!amount||amount<=0){ alert("Nhập số tiền lớn hơn 0"); return; }
    if(!walletId){ alert("Chọn ví"); return; }
    if(type==="transfer"&&(!toWalletId||toWalletId===walletId)){ alert("Chọn ví nhận khác ví nguồn"); return; }
    const t={id:editing?init.id:uid(),type,amount,date,note,walletId};
    if(type==="transfer") t.toWalletId=toWalletId; else t.categoryId=categoryId;
    saveTx(t); onClose();
  };
  const remove=()=>{ if(confirm("Xóa giao dịch này?")){ delTx(init.id); onClose(); } };

  return (
    <Sheet title={editing?"Sửa giao dịch":"Thêm giao dịch"} onClose={onClose}>
      <div className="typeseg">
        {[["expense","Chi tiền","out"],["income","Thu tiền","in"],["transfer","Chuyển","tr"]].map(([k,l,cl])=>
          <button key={k} className={type===k?("on "+cl):""} onClick={()=>setT(k)}>{l}</button>)}
      </div>

      <div className="field"><label>Số tiền</label>
        <MoneyInput value={amount} onChange={setAmount} kind={type==="income"?"in":type==="expense"?"out":""} autoFocus={!editing}/>
      </div>

      {type!=="transfer" &&
        <div className="field"><label>Danh mục</label>
          <CatPicker cats={cats} type={type} value={categoryId} onChange={setCategoryId} owner={owner}/></div>}

      {type==="transfer" ?
        <div className="two">
          <WalletSelect members={members} wallets={wallets} value={walletId} onChange={setWalletId} label="Từ ví"/>
          <WalletSelect members={members} wallets={wallets} value={toWalletId} onChange={setToWalletId} label="Đến ví"/>
        </div>
        : <WalletSelect members={members} wallets={wallets} value={walletId} onChange={setWalletId}
            label={type==="income"?"Vào ví":"Từ ví"}/>}

      <div className="two">
        <div className="field"><label>Ngày</label>
          <input className="input" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
        <div className="field"><label>Thành viên</label>
          <input className="input" readOnly value={(memberOfWallet(walletId)||{}).name||"—"} style={{color:"var(--muted)"}}/></div>
      </div>

      <div className="field"><label>Ghi chú</label>
        <input className="input" placeholder="VD: ăn trưa với khách…" value={note} onChange={e=>setNote(e.target.value)}/></div>

      <button className="btn pri block" onClick={save}>{editing?"Lưu thay đổi":"Thêm giao dịch"}</button>
      {editing && <button className="btn danger block" style={{marginTop:10}} onClick={remove}>🗑 Xóa giao dịch</button>}
    </Sheet>
  );
}
